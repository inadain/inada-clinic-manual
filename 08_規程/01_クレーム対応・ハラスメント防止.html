<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>クレーム対応・ハラスメント防止マニュアル</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: "Hiragino Sans", "Noto Sans JP", sans-serif; background: #f5f7fa; min-height: 100vh; display: flex; flex-direction: column; }

  .top-bar {
    background: linear-gradient(90deg, #1558a0, #1e74c8);
    color: #fff;
    padding: 14px 20px;
    display: flex;
    align-items: center;
    gap: 12px;
  }
  .top-bar a { color: rgba(255,255,255,.75); text-decoration: none; font-size: 12px; }
  .top-bar a:hover { color: #fff; }
  .top-bar .sep { color: rgba(255,255,255,.4); margin: 0 4px; }
  .top-bar .cur { font-size: 13px; font-weight: 700; }

  .header {
    background: #fff;
    border-bottom: 1px solid #e5e7eb;
    padding: 20px 24px 16px;
  }
  .header-tag { font-size: 11px; color: #6b7280; font-weight: 700; letter-spacing: .08em; margin-bottom: 4px; }
  .header-title { font-size: 20px; font-weight: 800; color: #111827; margin-bottom: 4px; }
  .header-meta { font-size: 12px; color: #6b7280; }

  .action-bar {
    background: #fff;
    border-bottom: 1px solid #e5e7eb;
    padding: 10px 24px;
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .btn-dl {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    background: #1558a0;
    color: #fff;
    font-size: 13px;
    font-weight: 700;
    padding: 8px 16px;
    border-radius: 8px;
    text-decoration: none;
  }
  .btn-dl:hover { background: #1e74c8; }
  .btn-open {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    background: #f3f4f6;
    color: #374151;
    font-size: 13px;
    font-weight: 700;
    padding: 8px 16px;
    border-radius: 8px;
    text-decoration: none;
    border: 1px solid #d1d5db;
  }

  .pdf-wrap {
    flex: 1;
    padding: 16px 24px;
  }
  .pdf-frame {
    width: 100%;
    height: calc(100vh - 200px);
    min-height: 600px;
    border: 1px solid #d1d5db;
    border-radius: 8px;
    background: #fff;
  }

  .fallback {
    display: none;
    text-align: center;
    padding: 40px;
    color: #6b7280;
    font-size: 14px;
  }
</style>
</head>
<body>

<div class="top-bar">
  <a href="../index.html">🏠 マニュアルトップ</a>
  <span class="sep">›</span>
  <span class="cur">院内規程・方針</span>
</div>

<div class="header">
  <div class="header-tag">院内規程・方針</div>
  <div class="header-title">クレーム対応・ハラスメント防止マニュアル</div>
  <div class="header-meta">2025年10月策定 ／ いなだ医院</div>
</div>


<div class="pdf-wrap">
  <iframe class="pdf-frame"
          src="クレーム対応・ハラスメント防止マニュアル.pdf"
          title="クレーム対応・ハラスメント防止マニュアル">
    <p class="fallback">PDFを表示できません。<a href="クレーム対応・ハラスメント防止マニュアル.pdf">こちらからダウンロード</a>してください。</p>
  </iframe>
</div>

</body>
</html>
