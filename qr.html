<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>マニュアルサイト アクセス案内</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: "Hiragino Sans", "Noto Sans JP", sans-serif;
    background: #f5f7fa;
    display: flex;
    justify-content: center;
    align-items: flex-start;
    min-height: 100vh;
    padding: 24px;
    gap: 24px;
    flex-wrap: wrap;
  }

  .card {
    background: #fff;
    border-radius: 16px;
    box-shadow: 0 4px 24px rgba(0,0,0,.10);
    padding: 36px 40px;
    width: 360px;
    text-align: center;
  }

  .label {
    font-size: 11px;
    font-weight: 700;
    letter-spacing: .12em;
    color: #6b7280;
    text-transform: uppercase;
    margin-bottom: 6px;
  }

  h2 {
    font-size: 18px;
    font-weight: 800;
    color: #111827;
    margin-bottom: 4px;
  }

  .subtitle {
    font-size: 12px;
    color: #6b7280;
    margin-bottom: 24px;
  }

  .qr-wrap {
    display: flex;
    justify-content: center;
    margin-bottom: 20px;
  }

  .qr-wrap canvas, .qr-wrap img {
    border-radius: 8px;
    border: 1px solid #e5e7eb;
    padding: 10px;
  }

  .url {
    font-size: 12px;
    color: #4b5563;
    background: #f3f4f6;
    border-radius: 8px;
    padding: 8px 14px;
    margin-bottom: 20px;
    font-family: monospace;
    word-break: break-all;
  }

  .note {
    font-size: 12px;
    color: #6b7280;
    background: #f9fafb;
    border: 1px solid #e5e7eb;
    border-radius: 8px;
    padding: 10px 14px;
    text-align: left;
    line-height: 1.6;
  }

  .note strong {
    color: #374151;
  }

  .badge-no {
    display: inline-block;
    background: #fee2e2;
    color: #991b1b;
    font-size: 11px;
    font-weight: 700;
    padding: 2px 8px;
    border-radius: 99px;
    margin-bottom: 8px;
  }

  .wifi-info {
    text-align: left;
    border-top: 1px solid #e5e7eb;
    margin-top: 20px;
    padding-top: 16px;
    font-size: 12px;
    color: #374151;
    line-height: 2;
  }

  .wifi-info span {
    color: #6b7280;
    margin-right: 6px;
  }

  @media print {
    body { background: #fff; padding: 0; }
    .card { box-shadow: none; border: 1px solid #d1d5db; }
  }
</style>
</head>
<body>

<!-- マニュアルサイトQR -->
<div class="card">
  <div class="label">いなだ医院</div>
  <h2>業務マニュアルサイト</h2>
  <p class="subtitle">スタッフ専用</p>

  <div class="qr-wrap" id="qr-manual"></div>

  <div class="url">https://manual.inadaiin.com/</div>

  <div class="note">
    <div class="badge-no">院外アクセス不可</div><br>
    <strong>📶 院内WiFiに接続した状態</strong>でQRを読み取ると開きます。<br>
    院外からはアクセスできません。
  </div>
</div>

<!-- 院内WiFi接続QR -->
<div class="card">
  <div class="label">院内WiFi</div>
  <h2>Buffalo-G-6AB0</h2>
  <p class="subtitle">接続用QRコード</p>

  <div class="qr-wrap" id="qr-wifi"></div>

  <div class="wifi-info">
    <div><span>SSID</span>Buffalo-G-6AB0</div>
    <div><span>パスワード</span>scuunee5b7b3b</div>
  </div>
</div>

<script>
  new QRCode(document.getElementById("qr-manual"), {
    text: "https://manual.inadaiin.com/",
    width: 200, height: 200,
    colorDark: "#111827", colorLight: "#ffffff",
    correctLevel: QRCode.CorrectLevel.M
  });

  new QRCode(document.getElementById("qr-wifi"), {
    text: "WIFI:T:WPA;S:Buffalo-G-6AB0;P:scuunee5b7b3b;;",
    width: 200, height: 200,
    colorDark: "#111827", colorLight: "#ffffff",
    correctLevel: QRCode.CorrectLevel.M
  });
</script>
</body>
</html>
