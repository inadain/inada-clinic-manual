<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>マニュアルサイト アクセス案内</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: "Hiragino Sans", "Noto Sans JP", sans-serif;
    background: #f5f7fa;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    padding: 24px;
  }

  .card {
    background: #fff;
    border-radius: 16px;
    box-shadow: 0 4px 24px rgba(0,0,0,.10);
    padding: 40px 48px;
    max-width: 480px;
    width: 100%;
    text-align: center;
  }

  .label {
    font-size: 12px;
    font-weight: 700;
    letter-spacing: .12em;
    color: #6b7280;
    text-transform: uppercase;
    margin-bottom: 8px;
  }

  h1 {
    font-size: 22px;
    font-weight: 800;
    color: #111827;
    margin-bottom: 4px;
  }

  .subtitle {
    font-size: 13px;
    color: #6b7280;
    margin-bottom: 32px;
  }

  #qrcode {
    display: flex;
    justify-content: center;
    margin-bottom: 24px;
  }

  #qrcode canvas, #qrcode img {
    border-radius: 8px;
    border: 1px solid #e5e7eb;
    padding: 12px;
  }

  .url {
    font-size: 13px;
    color: #4b5563;
    background: #f3f4f6;
    border-radius: 8px;
    padding: 10px 16px;
    margin-bottom: 28px;
    font-family: monospace;
    letter-spacing: .02em;
    word-break: break-all;
  }

  .rules {
    text-align: left;
    border-top: 1px solid #e5e7eb;
    padding-top: 24px;
  }

  .rules-title {
    font-size: 12px;
    font-weight: 700;
    color: #374151;
    margin-bottom: 12px;
  }

  .rule {
    display: flex;
    align-items: flex-start;
    gap: 10px;
    margin-bottom: 10px;
    font-size: 13px;
    color: #374151;
    line-height: 1.5;
  }

  .rule-icon {
    flex-shrink: 0;
    width: 24px;
    height: 24px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 13px;
    margin-top: 1px;
  }

  .icon-green { background: #d1fae5; }
  .icon-blue  { background: #dbeafe; }

  @media print {
    body { background: #fff; padding: 0; }
    .card { box-shadow: none; border: 1px solid #d1d5db; margin: 20mm auto; }
  }
</style>
</head>
<body>
<div class="card">
  <div class="label">いなだ医院</div>
  <h1>業務マニュアルサイト</h1>
  <p class="subtitle">スタッフ専用 · アクセス案内</p>

  <div id="qrcode"></div>

  <div class="url">https://manual.inadaiin.com/</div>

  <div class="rules">
    <div class="rules-title">アクセス方法</div>

    <div class="rule">
      <div class="rule-icon icon-green">📶</div>
      <div>
        <strong>院内WiFiから</strong><br>
        QRコードを読み取るだけで開きます。
      </div>
    </div>

    <div class="rule">
      <div class="rule-icon icon-blue">🔑</div>
      <div>
        <strong>院外から（院長のみ）</strong><br>
        メールアドレスを入力 → Gmailに届いた6桁のコードを入力。
      </div>
    </div>
  </div>
</div>

<script>
  new QRCode(document.getElementById("qrcode"), {
    text: "https://manual.inadaiin.com/",
    width: 200,
    height: 200,
    colorDark: "#111827",
    colorLight: "#ffffff",
    correctLevel: QRCode.CorrectLevel.M
  });
</script>
</body>
</html>
