<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>レセプト整合表</title>
<style>
:root{--blue:#1558a0;--bm:#1e74c8;--bl:#dbeafe;--bxl:#eff6ff;--teal:#0d9488;--tlt:#ccfbf1;--amb:#d97706;--alt:#fef3c7;--grn:#16a34a;--glt:#dcfce7;--red:#dc2626;--rlt:#fee2e2;--gray:#64748b;--glt2:#f1f5f9;--bd:#e2e8f0;--text:#0f172a;--bg:#f0f4f8;--w:#fff;--r:12px;--rs:8px;--sh:0 1px 4px rgba(0,0,0,.08);}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
body{font-family:-apple-system,BlinkMacSystemFont,"Hiragino Sans","Noto Sans JP",sans-serif;font-size:14px;color:var(--text);background:var(--bg);}
.header{background:linear-gradient(135deg,#0f3d6e,#1558a0,#1e74c8);padding:0 16px;min-height:56px;display:flex;align-items:center;position:sticky;top:0;z-index:100;}
.hi{position:relative;display:flex;align-items:center;width:100%;max-width:1100px;margin:0 auto;padding:10px 0 10px 110px;}
.back-link{position:absolute!important;left:0!important;top:50%!important;transform:translateY(-50%)!important;display:inline-flex!important;align-items:center;gap:5px;color:rgba(255,255,255,.92)!important;font-size:12px!important;font-weight:600;text-decoration:none;background:rgba(255,255,255,.18)!important;border:1px solid rgba(255,255,255,.3)!important;border-radius:20px;padding:6px 13px!important;}
.hl{height:28px;filter:brightness(0) invert(1);opacity:.9;display:block;margin:0 auto 3px;}
.header h1{font-size:16px;font-weight:800;color:#fff;margin:0;}
.header .sub{font-size:10px;color:rgba(255,255,255,.65);}
/* タブ切替 */
.main-tabs{display:flex;border-bottom:2px solid var(--bd);background:#fff;position:sticky;top:56px;z-index:90;}
.main-tab{flex:1;padding:12px;text-align:center;font-size:13px;font-weight:700;color:var(--gray);cursor:pointer;border:none;background:none;border-bottom:3px solid transparent;transition:all .15s;font-family:inherit;}
.main-tab.active{color:var(--blue);border-bottom-color:var(--blue);background:var(--bxl);}
/* レイアウト */
.pl{display:flex;max-width:1100px;margin:0 auto;}
.dsb{width:185px;flex-shrink:0;position:sticky;top:107px;height:calc(100vh - 107px);overflow-y:auto;background:#f8fafc;border-right:1px solid var(--bd);padding:10px 0;}
@media(max-width:699px){.dsb{display:none;}}
.dsh{font-size:10px;font-weight:800;color:var(--blue);text-transform:uppercase;letter-spacing:.08em;padding:0 12px 8px;border-bottom:2px solid var(--bl);margin-bottom:4px;}
.d-btn{display:block;width:100%;text-align:left;padding:8px 12px;font-size:12px;color:var(--gray);background:none;border:none;cursor:pointer;border-left:3px solid transparent;font-family:inherit;transition:all .15s;line-height:1.4;}
.d-btn:hover{color:var(--blue);background:#eff6ff;}
.d-btn.active{color:var(--blue);border-left-color:var(--blue);background:#eff6ff;font-weight:700;}
.ma{flex:1;min-width:0;padding:14px 14px 60px;}
/* 検索バー */
.sb{display:flex;gap:8px;margin-bottom:12px;align-items:center;}
.si{flex:1;padding:10px 14px;border:1.5px solid var(--bd);border-radius:10px;font-size:14px;font-family:inherit;background:#fff;}
.si:focus{outline:none;border-color:var(--bm);}
/* 病名別表示 */
.d-title{font-size:17px;font-weight:800;color:var(--blue);margin-bottom:14px;display:flex;align-items:center;gap:10px;flex-wrap:wrap;}
.d-badge{font-size:11px;background:var(--bxl);color:var(--blue);padding:3px 10px;border-radius:999px;font-weight:600;}
.sc{background:#fff;border-radius:var(--r);box-shadow:var(--sh);margin-bottom:12px;overflow:hidden;}
.sh{display:flex;align-items:center;gap:8px;padding:11px 14px;font-size:13px;font-weight:700;border-bottom:1px solid var(--bd);}
.sh.blue{background:var(--bxl);border-left:5px solid var(--bm);}
.sh.teal{background:var(--tlt);border-left:5px solid var(--teal);}
.sh.grn {background:var(--glt);border-left:5px solid var(--grn);}
.ig{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:5px;padding:10px 14px;}
.ic{background:var(--glt2);border-radius:var(--rs);padding:6px 10px;font-size:12px;color:var(--text);border-left:3px solid var(--bd);}
.ic.match{background:#eff6ff;border-left-color:var(--bm);color:var(--blue);font-weight:600;}
.drug-info{padding:10px 14px;font-size:13px;color:var(--gray);}
/* 逆引きタブ */
.rev-wrap{}
.rule-box{background:var(--alt);border:1px solid #fbbf24;border-left:5px solid var(--amb);border-radius:var(--rs);padding:12px 14px;margin-bottom:14px;font-size:13px;line-height:1.7;}
.rule-box strong{color:var(--amb);}
.filter-cats{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:12px;}
.fc{padding:5px 12px;border-radius:999px;border:1.5px solid var(--bd);background:#fff;font-size:12px;font-weight:600;cursor:pointer;color:var(--gray);transition:all .15s;}
.fc.active{background:var(--blue);border-color:var(--blue);color:#fff;}
.test-list{display:flex;flex-direction:column;gap:8px;}
.tc{background:#fff;border-radius:var(--r);box-shadow:var(--sh);overflow:hidden;border-left:5px solid var(--bm);}
.tc-head{display:flex;align-items:center;gap:8px;padding:10px 14px;}
.tc-name{font-size:13px;font-weight:800;flex:1;}
.tc-cat{font-size:10px;background:var(--glt2);color:var(--gray);padding:2px 8px;border-radius:999px;flex-shrink:0;}
.tc-body{padding:8px 14px 12px;border-top:1px solid var(--bd);display:grid;grid-template-columns:1fr 1fr;gap:8px;}
@media(max-width:500px){.tc-body{grid-template-columns:1fr;}}
.dx-block{}
.dx-label{font-size:10px;font-weight:800;color:var(--gray);text-transform:uppercase;letter-spacing:.06em;margin-bottom:4px;}
.dx-primary{background:var(--glt);border-left:3px solid var(--grn);border-radius:var(--rs);padding:6px 10px;font-size:13px;font-weight:700;color:#166534;}
.dx-others{display:flex;flex-wrap:wrap;gap:4px;margin-top:4px;}
.dx-chip{background:var(--glt2);border-radius:999px;padding:3px 10px;font-size:11px;color:var(--gray);}
.utagage-block{}
.utagage-label{font-size:10px;font-weight:800;color:var(--amb);text-transform:uppercase;letter-spacing:.06em;margin-bottom:4px;}
.utagage-val{background:var(--alt);border-left:3px solid var(--amb);border-radius:var(--rs);padding:6px 10px;font-size:12px;color:#92400e;}
mark{background:#fef08a;border-radius:2px;padding:0 1px;}
.empty-msg{text-align:center;padding:48px;color:var(--gray);}
.tab-content{display:none;}
.tab-content.active{display:block;}
/* ── クイズ ── */
.qz-wrap{padding:16px;max-width:460px;margin:0 auto;}
.qz-hdr{display:flex;justify-content:space-between;align-items:center;font-size:12px;color:var(--gray);margin-bottom:8px;}
.qz-prog{height:5px;background:var(--bd);border-radius:3px;margin-bottom:16px;overflow:hidden;}
.qz-prog-bar{height:100%;background:var(--blue);border-radius:3px;transition:width .4s;}
.qz-card{background:#fff;border:1px solid var(--bd);border-radius:14px;padding:24px 20px;text-align:center;margin-bottom:14px;box-shadow:0 2px 8px rgba(0,0,0,.05);}
.qz-label{font-size:10px;font-weight:800;color:var(--gray);letter-spacing:.08em;text-transform:uppercase;margin-bottom:6px;}
.qz-disease{font-size:19px;font-weight:800;color:var(--text);margin-bottom:10px;}
.qz-sep{font-size:18px;color:var(--bd);margin-bottom:10px;}
.qz-drug{font-size:22px;font-weight:900;color:var(--blue);margin-bottom:8px;}
.qz-hint{font-size:13px;color:var(--gray);}
.qz-btns{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:12px;}
.qz-btn{padding:20px 8px;border-radius:12px;border:2.5px solid;font-size:26px;font-weight:900;cursor:pointer;background:#fff;transition:all .15s;font-family:inherit;}
.qz-btn.ok{border-color:#16a34a;color:#16a34a;}
.qz-btn.ng{border-color:#dc2626;color:#dc2626;}
.qz-btn:active{transform:scale(.96);}
.qz-btn:disabled{opacity:.45;cursor:default;}
.qz-btn.correct-ans{background:#f0fdf4 !important;}
.qz-btn.wrong-ans{background:#fef2f2 !important;}
.qz-btn.user-wrong{border-style:dashed;}
.qz-fb{border-radius:10px;padding:12px 14px;font-size:13px;margin-bottom:12px;display:none;border-left:4px solid;}
.qz-fb.show{display:block;}
.qz-fb.ok-fb{background:#f0fdf4;border-color:#16a34a;color:#166534;}
.qz-fb.ng-fb{background:#fef2f2;border-color:#dc2626;color:#991b1b;}
.qz-next{width:100%;padding:14px;border-radius:10px;border:none;background:var(--blue);color:#fff;font-size:14px;font-weight:700;cursor:pointer;font-family:inherit;display:none;}
.qz-next.show{display:block;}
.qz-result{text-align:center;background:#fff;border-radius:16px;border:1px solid var(--bd);padding:36px 20px;box-shadow:0 2px 8px rgba(0,0,0,.05);}
.qz-big{font-size:56px;font-weight:900;color:var(--blue);line-height:1;}
.qz-big span{font-size:24px;color:var(--gray);}
.qz-rlabel{font-size:14px;color:var(--gray);margin:8px 0 24px;}
.qz-retry{padding:14px 32px;border-radius:10px;border:none;background:var(--blue);color:#fff;font-size:14px;font-weight:700;cursor:pointer;font-family:inherit;}
.msel{display:none;width:100%;padding:9px;border:1.5px solid var(--bd);border-radius:10px;font-size:14px;margin-bottom:12px;font-family:inherit;}
@media(max-width:699px){.msel{display:block;}}
/* ── テストコード表示 ── */
.ic-info{display:inline-flex;align-items:center;gap:3px;margin-left:5px;font-size:10px;background:rgba(21,88,160,.08);border:1px solid rgba(21,88,160,.15);border-radius:4px;padding:1px 5px;color:var(--blue);vertical-align:middle;flex-shrink:0;white-space:nowrap;}
.ic-code-num{font-size:9px;color:var(--gray);font-variant-numeric:tabular-nums;}
.tc-pts{font-size:11px;background:var(--bxl);color:var(--blue);padding:2px 7px;border-radius:999px;font-weight:700;flex-shrink:0;}
</style>
</head>
<body>

<header class="header">
  <div class="hi">
    <a href="../index.html" class="back-link">← 一覧</a>
    <div>
      <img src="../assets/logo.png" class="hl" alt="ロゴ">
      <h1>📋 レセプト整合表</h1>
      <div class="sub">2026/06マスター更新済 · 病名別 / 逆引き / クイズ</div>
    </div>
  </div>
</header>

<div class="main-tabs">
  <button class="main-tab active" onclick="switchTab('disease',this)">📂 病名別</button>
  <button class="main-tab" onclick="switchTab('reverse',this)">🔍 逆引き</button>
  <button class="main-tab" onclick="switchTab('quiz',this)">🧠 クイズ</button>
</div>

<div class="pl">
  <!-- サイドバー（病名別タブ時のみ有効） -->
  <nav class="dsb" id="diseaseSidebar">
    <div class="dsh">傷病名</div>
    <button class="d-btn active" onclick="showDisease('咽頭喉頭炎',this)">咽頭喉頭炎</button>
    <button class="d-btn" onclick="showDisease('急性上気道炎',this)">急性上気道炎</button>
    <button class="d-btn" onclick="showDisease('急性気管支炎',this)">急性気管支炎</button>
    <button class="d-btn" onclick="showDisease('喘息性気管支炎',this)">喘息性気管支炎</button>

    <button class="d-btn" onclick="showDisease('感染性胃腸炎',this)">感染性胃腸炎</button>
    <button class="d-btn" onclick="showDisease('脱水症',this)">脱水症</button>

    <button class="d-btn" onclick="showDisease('ＣＯＶＩＤ－１９',this)">ＣＯＶＩＤ－１９</button>

    <button class="d-btn" onclick="showDisease('マイコプラズマ感染症',this)">マイコプラズマ感染症</button>
    <button class="d-btn" onclick="showDisease('腎機能低下',this)">腎機能低下</button>
    <button class="d-btn" onclick="showDisease('肝機能障害',this)">肝機能障害</button>
    <button class="d-btn" onclick="showDisease('膵炎',this)">膵炎</button>
    <button class="d-btn" onclick="showDisease('糖尿病',this)">糖尿病</button>
    <button class="d-btn" onclick="showDisease('２型糖尿病',this)">２型糖尿病</button>
    <button class="d-btn" onclick="showDisease('高コレステロール血症',this)">高コレステロール血症</button>
    <button class="d-btn" onclick="showDisease('高脂血症',this)">高脂血症</button>
    <button class="d-btn" onclick="showDisease('高血圧症',this)">高血圧症</button>
    <button class="d-btn" onclick="showDisease('高尿酸血症',this)">高尿酸血症</button>

    <button class="d-btn" onclick="showDisease('狭心症',this)">狭心症</button>
    <button class="d-btn" onclick="showDisease('心房細動',this)">心房細動</button>
    <button class="d-btn" onclick="showDisease('非弁膜症性心房細動',this)">非弁膜症性心房細動</button>
    <button class="d-btn" onclick="showDisease('湿疹・皮膚炎',this)">湿疹・皮膚炎</button>
    <button class="d-btn" onclick="showDisease('気管支喘息',this)">気管支喘息</button>
    <button class="d-btn" onclick="showDisease('慢性閉塞性肺疾患',this)">慢性閉塞性肺疾患</button>
    <button class="d-btn" onclick="showDisease('アレルギー性鼻炎',this)">アレルギー性鼻炎</button>
    <button class="d-btn" onclick="showDisease('骨粗鬆症',this)">骨粗鬆症</button>
    <button class="d-btn" onclick="showDisease('甲状腺機能亢進症',this)">甲状腺機能亢進症</button>
    <button class="d-btn" onclick="showDisease('甲状腺機能低下症',this)">甲状腺機能低下症</button>
    <button class="d-btn" onclick="showDisease('貧血',this)">貧血</button>
    <button class="d-btn" onclick="showDisease('鉄欠乏性貧血',this)">鉄欠乏性貧血</button>
    <button class="d-btn" onclick="showDisease('睡眠時無呼吸症候群',this)">睡眠時無呼吸症候群</button>
    <button class="d-btn" onclick="showDisease('慢性胃炎',this)">慢性胃炎</button>
    <button class="d-btn" onclick="showDisease('便秘症',this)">便秘症</button>
    <button class="d-btn" onclick="showDisease('認知症',this)">認知症</button>
    <button class="d-btn" onclick="showDisease('アルツハイマー型認知症',this)">アルツハイマー型認知症</button>
    <button class="d-btn" onclick="showDisease('レビー小体型認知症',this)">レビー小体型認知症</button>
  </nav>

  <div class="ma">
    <!-- タブ1: 病名別 -->
    <div class="tab-content active" id="tab-disease">
      <div class="sb">
        <input type="text" class="si" id="dQ" placeholder="検査・管理料名で絞り込み..." oninput="renderDisease()">
      </div>
      <select class="msel" id="msel" onchange="showDisease(this.value,null)">
        <option value="">-- 傷病名を選択 --</option>
        <option value="咽頭喉頭炎">咽頭喉頭炎</option><option value="急性上気道炎">急性上気道炎</option><option value="急性気管支炎">急性気管支炎</option><option value="喘息性気管支炎">喘息性気管支炎</option><option value="悪心">悪心</option><option value="感染性胃腸炎">感染性胃腸炎</option><option value="脱水症">脱水症</option><option value="逆流性食道炎">逆流性食道炎</option><option value="維持療法の必要な難治性逆流性食道炎">維持療法の必要な難治性逆流性食道炎</option><option value="腰痛症">腰痛症</option><option value="めまい症">めまい症</option><option value="ＣＯＶＩＤ－１９">ＣＯＶＩＤ－１９</option><option value="インフルエンザ">インフルエンザ</option><option value="マイコプラズマ感染症">マイコプラズマ感染症</option><option value="腎機能低下">腎機能低下</option><option value="肝機能障害">肝機能障害</option><option value="膵炎">膵炎</option><option value="糖尿病">糖尿病</option><option value="２型糖尿病">２型糖尿病</option><option value="高コレステロール血症">高コレステロール血症</option><option value="高脂血症">高脂血症</option><option value="高血圧症">高血圧症</option><option value="高尿酸血症">高尿酸血症</option><option value="前立腺肥大症">前立腺肥大症</option><option value="慢性心不全">慢性心不全</option><option value="虚血性脳血管障害">虚血性脳血管障害</option><option value="狭心症">狭心症</option><option value="心房細動">心房細動</option><option value="非弁膜症性心房細動">非弁膜症性心房細動</option><option value="気管支喘息">気管支喘息</option><option value="慢性閉塞性肺疾患">慢性閉塞性肺疾患</option><option value="アレルギー性鼻炎">アレルギー性鼻炎</option><option value="湿疹・皮膚炎">湿疹・皮膚炎</option><option value="骨粗鬆症">骨粗鬆症</option><option value="甲状腺機能亢進症">甲状腺機能亢進症</option><option value="甲状腺機能低下症">甲状腺機能低下症</option><option value="貧血">貧血</option><option value="鉄欠乏性貧血">鉄欠乏性貧血</option><option value="睡眠時無呼吸症候群">睡眠時無呼吸症候群</option><option value="慢性胃炎">慢性胃炎</option><option value="便秘症">便秘症</option><option value="認知症">認知症</option><option value="アルツハイマー型認知症">アルツハイマー型認知症</option><option value="レビー小体型認知症">レビー小体型認知症</option>

      <div id="diseaseContent"><div class="empty-msg">左の傷病名を選択してください</div></div>

      <div class="rule-box">

<script>
const DISEASES = {

const TEST_CATS = ["感染症","血液一般","血糖・糖尿病","脂質","腎機能","肝機能","膵臓","循環器","甲状腺","骨・画像","呼吸器","その他"];


let curDisease = null, curRevCat = "すべて", activeTab = "disease";

function esc(s){return String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");}
function mark(s,q){if(!q)return esc(s);return esc(s).replace(new RegExp(esc(q).replace(/[.*+?^{}()|[\]\\]/g,"\\$&"),"gi"),m=>`<mark>${m}</mark>`);}

/* ── タブ切替 ── */
function switchTab(tab, btn){
  activeTab = tab;
  document.querySelectorAll(".main-tab").forEach(b=>b.classList.remove("active"));
  btn.classList.add("active");
  document.querySelectorAll(".tab-content").forEach(t=>t.classList.remove("active"));
  document.getElementById("tab-"+tab).classList.add("active");
  document.getElementById("diseaseSidebar").style.display = tab==="disease" ? "" : "none";
  if(tab==="reverse") renderReverse();
  if(tab==="quiz") qzStart();
}

/* ── 病名別タブ ── */
function showDisease(name, btn){
  curDisease = name;
  document.querySelectorAll(".d-btn").forEach(b=>b.classList.remove("active"));
  if(btn) btn.classList.add("active");
  var s=document.getElementById("msel"); if(s) s.value=name;
  renderDisease();
}
function renderDisease(){
  var q = document.getElementById("dQ").value.trim().toLowerCase();
  var d = DISEASES[curDisease];
  var el = document.getElementById("diseaseContent");
  if(!d){el.innerHTML='<div class="empty-msg">左の傷病名を選択してください</div>';return;}
  var ft = i=>!q||i.toLowerCase().includes(q);
  var tests=d.tests.filter(ft), mgmts=d.mgmt.filter(ft);
  var h=`<div class="d-title">📌 ${esc(curDisease)}<span class="d-badge">対応薬剤 ${(ADOPTED[curDisease]||[]).length}種</span></div>`;
  if(tests.length){
    h+='<div class="sc"><div class="sh blue">🔬 検査（'+tests.length+'件）</div><div class="ig">';
    tests.forEach(t=>{const ci=TEST_CODES[t];const bi=ci?`<span class="ic-info">${ci.p}点 <span class="ic-code-num">${ci.c}</span></span>`:'';h+=`<div class="ic${q&&t.toLowerCase().includes(q)?' match':''}">${mark(t,q)}${bi}</div>`;});
    h+='</div></div>';
  }
  if(mgmts.length){
    var shown=mgmts.slice(0,30);
    h+='<div class="sc"><div class="sh teal">📋 管理料・指導・処置（'+mgmts.length+'件）</div><div class="ig">';
    shown.forEach(m=>h+=`<div class="ic${q&&m.toLowerCase().includes(q)?' match':''}">` + mark(m,q)+'</div>');
    if(mgmts.length>30) h+=`<div class="ic" style="color:var(--gray);font-style:italic">他 ${mgmts.length-30} 件...</div>`;
    h+='</div></div>';
  }
  var adrugs=(ADOPTED[curDisease]||[]).filter(dr=>!q||dr.toLowerCase().includes(q));
  if(adrugs.length){
    h+='<div class="sc"><div class="sh grn">💊 当院採用薬（'+adrugs.length+'剤）</div><div class="ig">';
    adrugs.forEach(dr=>h+=`<div class="ic${q&&dr.toLowerCase().includes(q)?' match':''}"><a href="03b_採用薬リスト.html" style="color:inherit;text-decoration:none;">${mark(dr,q)}</a></div>`);
    h+='</div></div>';
  }
  if(!tests.length&&!mgmts.length) h+='<div class="empty-msg">絞り込み条件に一致しません</div>';
  el.innerHTML=h;
}

/* ── 逆引きタブ ── */
function buildCatFilters(){
  var el=document.getElementById("catFilters");
  var all=['すべて',...TEST_CATS];
  el.innerHTML=all.map(c=>`<button class="fc${c===curRevCat?' active':''}" onclick="setCat('${esc(c)}',this)">${esc(c)}</button>`).join('');
}
function setCat(cat,btn){
  curRevCat=cat;
  document.querySelectorAll(".fc").forEach(b=>b.classList.remove("active"));
  btn.classList.add("active");
  renderReverse();
}
function renderReverse(){
  var q = document.getElementById("rQ").value.trim().toLowerCase();
  var el = document.getElementById("reverseContent");
  var filtered = TESTS.filter(t=>{
    if(curRevCat!=="すべて"&&t.c!==curRevCat) return false;
    if(q&&!t.n.toLowerCase().includes(q)&&!t.p.toLowerCase().includes(q)&&!t.o.join("").toLowerCase().includes(q)) return false;
    return true;
  });
  if(!filtered.length){el.innerHTML='<div class="empty-msg">該当なし</div>';return;}
  el.innerHTML=filtered.map(t=>{
    var othersHtml=t.o.length?t.o.map(o=>`<span class="dx-chip">${esc(o)}</span>`).join(''):'';
    return `<div class="tc">
  <div class="tc-head">
    <span class="tc-name">${mark(t.n,q)}</span>
    ${TEST_CODES[t.n]?`<span class="tc-pts">${TEST_CODES[t.n].p}点</span>`:''}
    <span class="tc-cat">${esc(t.c)}</span>
  </div>
  <div class="tc-body">
    <div class="dx-block">
      <div class="dx-label">✅ 確定病名（主）</div>
      <div class="dx-primary">${mark(t.p,q)}</div>
      ${othersHtml?`<div class="dx-others">${othersHtml}</div>`:''}
    </div>
    <div class="utagage-block">
      <div class="utagage-label">⚠️ 確定なし → 疑いを追加</div>
      <div class="utagage-val">${esc(t.p)}の疑い</div>
    </div>
  </div>
</div>`;
  }).join('');
}

/* ── 初期化 ── */
buildCatFilters();
showDisease(DISEASE_ORDER[0], document.querySelector(".d-btn"));

/* ── クイズ ── */
const QZ_TOTAL = 10;
let qzState = {q:0, score:0, done:false};
let qzCur = null;

function qzGen(){
  const ds = Object.keys(ADOPTED).filter(d=>ADOPTED[d].length>0);
  const disease = ds[Math.floor(Math.random()*ds.length)];
  const isOk = Math.random()>0.4;
  let drug;
  if(isOk){
    const list = ADOPTED[disease];
    drug = list[Math.floor(Math.random()*list.length)];
  } else {
    const others = ds.filter(d=>d!==disease);
    let tries=0, found=false;
    while(!found && tries<30){
      const od = others[Math.floor(Math.random()*others.length)];
      const dl = ADOPTED[od];
      const cand = dl[Math.floor(Math.random()*dl.length)];
      if(!ADOPTED[disease].includes(cand)){drug=cand;found=true;}
      tries++;
    }
    if(!found){const list=ADOPTED[disease];drug=list[Math.floor(Math.random()*list.length)];return{disease,drug,ok:true};}
  }
  return {disease,drug,ok:isOk};
}

function qzStart(){
  qzState={q:0,score:0,done:false};
  qzRender();
}

function qzRender(){
  const c=document.getElementById('quizContainer');
  if(qzState.q>=QZ_TOTAL){
    const pct=Math.round(qzState.score/QZ_TOTAL*100);
    const em=pct>=80?'🎉':pct>=60?'👍':'📖';
    const msg=pct>=80?'すばらしい！':pct>=60?'よくできました！':'もう少し練習しましょう';
    c.innerHTML=`<div class="qz-result"><div style="font-size:52px;margin-bottom:12px">${em}</div>
      <div class="qz-big">${qzState.score}<span>/${QZ_TOTAL}</span></div>
      <div class="qz-rlabel">${pct}% 正解 — ${msg}</div>
      <button class="qz-retry" onclick="qzStart()">もう1回チャレンジ</button></div>`;
    return;
  }
  qzCur=qzGen();
  const {disease,drug}=qzCur;
  const pw=Math.round(qzState.q/QZ_TOTAL*100);
  c.innerHTML=`
    <div class="qz-hdr"><span>${qzState.q+1} / ${QZ_TOTAL} 問目</span><span>✅ ${qzState.score} 正解</span></div>
    <div class="qz-prog"><div class="qz-prog-bar" style="width:${pw}%"></div></div>
    <div class="qz-card">
      <div class="qz-label">病名</div>
      <div class="qz-disease">${esc(disease)}</div>
      <div class="qz-sep">×</div>
      <div class="qz-label">薬剤</div>
      <div class="qz-drug">${esc(drug)}</div>
      <div class="qz-hint">この組み合わせは正しい？</div>
    </div>
    <div class="qz-btns">
      <button class="qz-btn ok" id="qBtnOk" onclick="qzAnswer(true)">○<br><span style="font-size:12px;font-weight:700">通る</span></button>
      <button class="qz-btn ng" id="qBtnNg" onclick="qzAnswer(false)">×<br><span style="font-size:12px;font-weight:700">通らない</span></button>
    </div>
    <div class="qz-fb" id="qzFb"></div>
    <button class="qz-next" id="qzNext" onclick="qzNext()">${qzState.q+1>=QZ_TOTAL?'結果を見る':'次の問題 →'}</button>`;
}

function qzAnswer(userOk){
  if(!qzCur)return;
  const{disease,drug,ok}=qzCur;
  const correct=(userOk===ok);
  if(correct)qzState.score++;
  document.getElementById('qBtnOk').disabled=true;
  document.getElementById('qBtnNg').disabled=true;
  document.getElementById(ok?'qBtnOk':'qBtnNg').classList.add('correct-ans');
  if(!correct)document.getElementById(userOk?'qBtnOk':'qBtnNg').classList.add('wrong-ans','user-wrong');
  const fb=document.getElementById('qzFb');
  if(correct){
    fb.innerHTML=ok?`✅ 正解！「${esc(drug)}」は「${esc(disease)}」の採用薬です`:`✅ 正解！「${esc(drug)}」は「${esc(disease)}」では使いません`;
    fb.className='qz-fb show ok-fb';
  } else {
    fb.innerHTML=ok?`❌ 不正解。「${esc(drug)}」は「${esc(disease)}」の採用薬です`:`❌ 不正解。「${esc(drug)}」は「${esc(disease)}」では通りません`;
    fb.className='qz-fb show ng-fb';
  }
  document.getElementById('qzNext').classList.add('show');
  qzCur=null;
}

function qzNext(){
  qzState.q++;
  qzRender();
}
