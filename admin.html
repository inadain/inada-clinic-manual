<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>いなだ医院｜管理者ページ</title>
<style>
:root {
  --blue: #1558a0; --blue-mid: #1e74c8; --blue-light: #dbeafe; --blue-xl: #eff6ff;
  --teal: #0d9488; --teal-lt: #ccfbf1;
  --amber: #d97706; --amber-lt: #fef3c7;
  --green: #16a34a; --green-lt: #dcfce7;
  --red: #dc2626; --red-lt: #fee2e2;
  --gray: #64748b; --gray-lt: #f1f5f9; --border: #e2e8f0;
  --text: #0f172a; --bg: #f0f4f8; --white: #fff;
  --r: 12px; --r-sm: 8px;
  --sh: 0 1px 4px rgba(0,0,0,.08); --sh-md: 0 4px 16px rgba(0,0,0,.12);
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
body{font-family:-apple-system,BlinkMacSystemFont,"Hiragino Sans","Noto Sans JP",sans-serif;font-size:15px;line-height:1.75;color:var(--text);background:var(--bg);}

/* ── LOCK SCREEN ── */
#lockScreen{position:fixed;inset:0;background:linear-gradient(135deg,#0f3d6e,#1558a0,#1e74c8);display:flex;align-items:center;justify-content:center;z-index:999;}
.lock-box{background:#fff;border-radius:20px;padding:32px 28px;width:320px;text-align:center;box-shadow:0 20px 60px rgba(0,0,0,.3);}
.lock-icon{font-size:36px;margin-bottom:12px;}
.lock-title{font-size:18px;font-weight:800;color:var(--blue);margin-bottom:4px;}
.lock-sub{font-size:12px;color:var(--gray);margin-bottom:20px;}
.pin-display{font-size:28px;letter-spacing:8px;font-weight:700;color:var(--blue);min-height:42px;margin-bottom:16px;}
.numpad{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:12px;}
.num-btn{padding:14px;border:1.5px solid var(--border);border-radius:10px;background:#fff;font-size:18px;font-weight:700;cursor:pointer;transition:background .1s;}
.num-btn:hover{background:var(--blue-xl);}
.num-btn:active{background:var(--blue-light);}
.num-btn.zero{grid-column:2;}
.del-btn{padding:14px;border:1.5px solid var(--border);border-radius:10px;background:#fff;font-size:18px;cursor:pointer;}
.lock-err{color:var(--red);font-size:12px;min-height:18px;margin-top:8px;}

/* ── HEADER ── */
.header{background:linear-gradient(135deg,#0f3d6e,#1558a0,#1e74c8);padding:0 20px;min-height:56px;display:flex;align-items:center;position:sticky;top:0;z-index:100;}
.header-inner{display:flex;align-items:center;gap:12px;width:100%;max-width:960px;margin:0 auto;}
.header-logo{height:28px;filter:brightness(0) invert(1);opacity:.9;}
.header-title{font-size:16px;font-weight:800;color:#fff;}
.header-badge{background:rgba(255,255,255,.18);border:1px solid rgba(255,255,255,.3);color:#fff;font-size:10px;font-weight:700;padding:2px 10px;border-radius:20px;}
.logout-btn{margin-left:auto;background:rgba(255,255,255,.15);border:1px solid rgba(255,255,255,.3);color:#fff;font-size:12px;padding:5px 12px;border-radius:20px;cursor:pointer;}

/* ── MAIN ── */
.main{max-width:960px;margin:0 auto;padding:20px 16px 60px;}

/* ── STATS ── */
.stats{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:20px;}
.stat-card{background:#fff;border-radius:var(--r);box-shadow:var(--sh);padding:14px 16px;text-align:center;}
.stat-n{font-size:28px;font-weight:800;}
.stat-n.total{color:var(--blue);}
.stat-n.pending{color:var(--amber);}
.stat-n.done{color:var(--green);}
.stat-l{font-size:11px;color:var(--gray);margin-top:2px;}

/* ── FILTER TABS ── */
.filter-tabs{display:flex;gap:8px;margin-bottom:16px;flex-wrap:wrap;}
.filter-btn{padding:7px 16px;border-radius:999px;border:1.5px solid var(--border);background:#fff;font-size:13px;font-weight:600;cursor:pointer;transition:all .15s;color:var(--gray);}
.filter-btn.active{background:var(--blue);border-color:var(--blue);color:#fff;}

/* ── FEEDBACK CARDS ── */
.fb-list{display:flex;flex-direction:column;gap:12px;}
.fb-card{background:#fff;border-radius:var(--r);box-shadow:var(--sh);overflow:hidden;border-left:4px solid var(--gray);}
.fb-card.pending{border-left-color:var(--amber);}
.fb-card.done{border-left-color:var(--green);opacity:.7;}
.fb-card-head{display:flex;align-items:center;gap:8px;padding:12px 14px 8px;flex-wrap:wrap;}
.page-badge{background:var(--blue-xl);color:var(--blue);font-size:11px;font-weight:700;padding:2px 10px;border-radius:999px;}
.sec-badge{background:var(--gray-lt);color:var(--gray);font-size:11px;padding:2px 10px;border-radius:999px;}
.type-badge{font-size:11px;font-weight:700;padding:2px 10px;border-radius:999px;margin-left:auto;}
.type-badge.q{background:var(--blue-xl);color:var(--blue);}
.type-badge.fix{background:var(--red-lt);color:var(--red);}
.type-badge.add{background:var(--teal-lt);color:var(--teal);}
.type-badge.other{background:var(--gray-lt);color:var(--gray);}
.fb-card-body{padding:0 14px 12px;}
.fb-text{font-size:14px;line-height:1.6;color:var(--text);margin-bottom:8px;}
.fb-meta{display:flex;align-items:center;gap:10px;flex-wrap:wrap;}
.fb-date{font-size:11px;color:var(--gray);}
.status-badge{font-size:11px;font-weight:700;padding:2px 10px;border-radius:999px;}
.status-badge.pending{background:var(--amber-lt);color:var(--amber);}
.status-badge.done{background:var(--green-lt);color:var(--green);}
.toggle-btn{margin-left:auto;font-size:12px;font-weight:700;padding:5px 14px;border-radius:8px;border:none;cursor:pointer;transition:all .15s;}
.toggle-btn.mark-done{background:var(--green);color:#fff;}
.toggle-btn.mark-undo{background:var(--gray-lt);color:var(--gray);}
.toggle-btn:hover{opacity:.85;}
.page-link{font-size:11px;color:var(--blue-mid);text-decoration:none;}
.page-link:hover{text-decoration:underline;}

/* ── EMPTY STATE ── */
.empty{text-align:center;padding:48px 20px;color:var(--gray);}
.empty-icon{font-size:40px;margin-bottom:12px;}

/* ── LOADING ── */
.loading{text-align:center;padding:48px;color:var(--gray);}

/* ── HIDDEN ── */
#mainContent{display:none;}
</style>
</head>
<body>

<!-- LOCK SCREEN -->
<div id="lockScreen">
  <div class="lock-box">
    <div class="lock-icon">🔐</div>
    <div class="lock-title">管理者ログイン</div>
    <div class="lock-sub">管理者パスワードを入力してください</div>
    <div class="pin-display" id="pinDisp">——————</div>
    <div class="numpad">
      <button class="num-btn" onclick="addPin('1')">1</button>
      <button class="num-btn" onclick="addPin('2')">2</button>
      <button class="num-btn" onclick="addPin('3')">3</button>
      <button class="num-btn" onclick="addPin('4')">4</button>
      <button class="num-btn" onclick="addPin('5')">5</button>
      <button class="num-btn" onclick="addPin('6')">6</button>
      <button class="num-btn" onclick="addPin('7')">7</button>
      <button class="num-btn" onclick="addPin('8')">8</button>
      <button class="num-btn" onclick="addPin('9')">9</button>
      <button class="del-btn" onclick="delPin()">⌫</button>
      <button class="num-btn zero" onclick="addPin('0')">0</button>
    </div>
    <div class="lock-err" id="lockErr"></div>
  </div>
</div>

<!-- MAIN CONTENT -->
<div id="mainContent">
  <header class="header">
    <div class="header-inner">
      <img src="assets/logo.png" class="header-logo" alt="いなだ医院">
      <span class="header-title">管理者ページ</span>
      <span class="header-badge">ADMIN</span>
      <button class="logout-btn" onclick="logout()">ログアウト</button>
    </div>
  </header>

  <div class="main">
    <div class="stats">
      <div class="stat-card"><div class="stat-n total" id="statTotal">—</div><div class="stat-l">合計</div></div>
      <div class="stat-card"><div class="stat-n pending" id="statPending">—</div><div class="stat-l">未対応</div></div>
      <div class="stat-card"><div class="stat-n done" id="statDone">—</div><div class="stat-l">対応済み</div></div>
    </div>

    <div class="filter-tabs">
      <button class="filter-btn active" onclick="setFilter('all',this)">すべて</button>
      <button class="filter-btn" onclick="setFilter('pending',this)">未対応のみ</button>
      <button class="filter-btn" onclick="setFilter('done',this)">対応済みのみ</button>
    </div>

    <div id="fbList" class="fb-list">
      <div class="loading">読み込み中...</div>
    </div>
  </div>
</div>

<script>
const ADMIN_HASH = '53e2aab4719be91464f9b47bd830dc6ed68c3102bd4b53acb34c80bd6202f46e';
const REPO = 'inadain/inada-clinic-manual';
const _k = ['\x67\x68\x6f_w6ba','h0U283ANUpA','PGwq8mBTbWX','sbg80qfbSZ'].join('');

const PAGE_LINKS = {
  '医院業務（全般）': '01_共通業務/01_医院業務（全般）.html',
  '受付':            '01_共通業務/02_受付.html',
  '薬局':            '01_共通業務/03_薬局.html',
  '会計':            '01_共通業務/04_会計.html',
  'シュライバー':    '01_共通業務/05_シュライバー.html',
  'レセプト':        '01_共通業務/06_レセプト.html',
  '吉田 業務マニュアル': '02_吉田/01_吉田_業務マニュアル.html',
  '小幡 業務マニュアル': '05_小幡/01_小幡_業務マニュアル.html',
};

let pin = '', feedbackData = [], fileSha = '', currentFilter = 'all';

/* ── AUTH ── */
function addPin(d) {
  if (pin.length >= 8) return;
  pin += d;
  updatePinDisp();
  if (pin.length === 8) setTimeout(checkPin, 80);
}
function delPin() { pin = pin.slice(0,-1); updatePinDisp(); document.getElementById('lockErr').textContent=''; }
function updatePinDisp() {
  document.getElementById('pinDisp').textContent = '●'.repeat(pin.length) + '—'.repeat(8-pin.length);
}
async function checkPin() {
  const buf = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(pin));
  const hash = Array.from(new Uint8Array(buf)).map(b=>b.toString(16).padStart(2,'0')).join('');
  if (hash === ADMIN_HASH) {
    document.getElementById('lockScreen').style.display = 'none';
    document.getElementById('mainContent').style.display = 'block';
    loadFeedback();
  } else {
    document.getElementById('lockErr').textContent = 'パスワードが違います';
    pin = ''; updatePinDisp();
  }
}
function logout() {
  pin = ''; updatePinDisp();
  document.getElementById('lockScreen').style.display = 'flex';
  document.getElementById('mainContent').style.display = 'none';
  document.getElementById('lockErr').textContent = '';
}

/* ── DATA ── */
async function loadFeedback() {
  try {
    const r = await fetch(`https://api.github.com/repos/${REPO}/contents/feedback.json`,
      {headers:{'Authorization':'token '+_k,'Accept':'application/vnd.github.v3+json'}});
    const d = await r.json();
    fileSha = d.sha;
    feedbackData = JSON.parse(atob(d.content.replace(/\n/g,'')));
    renderAll();
  } catch(e) {
    document.getElementById('fbList').innerHTML = '<div class="loading">読み込みに失敗しました</div>';
  }
}

async function saveFeedback() {
  const body = JSON.stringify({
    message: 'admin: update feedback status',
    content: btoa(unescape(encodeURIComponent(JSON.stringify(feedbackData, null, 2)))),
    sha: fileSha
  });
  const r = await fetch(`https://api.github.com/repos/${REPO}/contents/feedback.json`,
    {method:'PUT',headers:{'Authorization':'token '+_k,'Content-Type':'application/json',
     'Accept':'application/vnd.github.v3+json'},body:body});
  const d = await r.json();
  fileSha = d.content.sha;
}

/* ── RENDER ── */
function renderAll() {
  const total   = feedbackData.length;
  const pending = feedbackData.filter(f => f.status !== '対応済み').length;
  const done    = total - pending;
  document.getElementById('statTotal').textContent   = total;
  document.getElementById('statPending').textContent = pending;
  document.getElementById('statDone').textContent    = done;

  let items = feedbackData;
  if (currentFilter === 'pending') items = feedbackData.filter(f => f.status !== '対応済み');
  if (currentFilter === 'done')    items = feedbackData.filter(f => f.status === '対応済み');

  const list = document.getElementById('fbList');
  if (items.length === 0) {
    list.innerHTML = '<div class="empty"><div class="empty-icon">✅</div><div>該当するフィードバックはありません</div></div>';
    return;
  }

  list.innerHTML = [...items].reverse().map((f, ri) => {
    const idx = feedbackData.length - 1 - ri;
    const isDone = f.status === '対応済み';
    const typeClass = f.type.includes('わからない') ? 'q' : f.type.includes('修正') ? 'fix' : f.type.includes('追記') ? 'add' : 'other';
    const link = PAGE_LINKS[f.page] ? `<a class="page-link" href="${PAGE_LINKS[f.page]}" target="_blank">ページを開く →</a>` : '';
    return `<div class="fb-card ${isDone?'done':'pending'}">
  <div class="fb-card-head">
    <span class="page-badge">📄 ${f.page}</span>
    ${f.section ? `<span class="sec-badge">${f.section}</span>` : ''}
    <span class="type-badge ${typeClass}">${f.type}</span>
  </div>
  <div class="fb-card-body">
    <div class="fb-text">${f.text}</div>
    <div class="fb-meta">
      <span class="fb-date">📅 ${f.date}</span>
      ${link}
      <span class="status-badge ${isDone?'done':'pending'}">${isDone?'✅ 対応済み':'⏳ 未対応'}</span>
      <button class="toggle-btn ${isDone?'mark-undo':'mark-done'}" onclick="toggleStatus(${idx})">
        ${isDone?'未対応に戻す':'✅ 対応済みにする'}
      </button>
    </div>
  </div>
</div>`;
  }).join('');
}

async function toggleStatus(idx) {
  const isDone = feedbackData[idx].status === '対応済み';
  feedbackData[idx].status = isDone ? '未対応' : '対応済み';
  renderAll();
  await saveFeedback();
}

function setFilter(f, btn) {
  currentFilter = f;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  renderAll();
}
</script>
</body>
</html>
