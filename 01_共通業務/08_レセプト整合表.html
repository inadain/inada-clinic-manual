<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>いなだ医院｜レセプト整合表</title>
<style>
:root {
  --blue:#1558a0;--blue-mid:#1e74c8;--blue-light:#dbeafe;--blue-xl:#eff6ff;
  --teal:#0d9488;--teal-lt:#ccfbf1;
  --amber:#d97706;--amber-lt:#fef3c7;
  --green:#16a34a;--green-lt:#dcfce7;
  --red:#dc2626;--red-lt:#fee2e2;
  --gray:#64748b;--gray-lt:#f1f5f9;--border:#e2e8f0;
  --text:#0f172a;--bg:#f0f4f8;--white:#fff;
  --r:12px;--r-sm:8px;--sh:0 1px 4px rgba(0,0,0,.08);
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
body{font-family:-apple-system,BlinkMacSystemFont,"Hiragino Sans","Noto Sans JP",sans-serif;font-size:15px;color:var(--text);background:var(--bg);}

/* HEADER */
.header{background:linear-gradient(135deg,#0f3d6e,#1558a0,#1e74c8);padding:0 16px;min-height:56px;display:flex;align-items:center;position:sticky;top:0;z-index:100;}
.header-inner{position:relative;display:flex;align-items:center;width:100%;max-width:1100px;margin:0 auto;padding:10px 0 10px 110px;}
.back-link{position:absolute!important;left:0!important;top:50%!important;transform:translateY(-50%)!important;display:inline-flex!important;align-items:center;gap:5px;color:rgba(255,255,255,.92)!important;font-size:12px!important;font-weight:600;text-decoration:none;background:rgba(255,255,255,.18)!important;border:1px solid rgba(255,255,255,.3)!important;border-radius:20px;padding:6px 13px!important;white-space:nowrap;}
.back-link:hover{background:rgba(255,255,255,.3)!important;}
.header-logo{height:28px;filter:brightness(0) invert(1);opacity:.9;display:block;margin:0 auto 3px;}
.header h1{font-size:16px;font-weight:800;color:#fff;margin:0;}
.header .sub{font-size:10px;color:rgba(255,255,255,.65);}

/* LAYOUT */
.page-layout{display:flex;max-width:1100px;margin:0 auto;gap:0;}

/* SIDEBAR */
.cat-sidebar{width:180px;flex-shrink:0;position:sticky;top:56px;height:calc(100vh - 56px);overflow-y:auto;background:#f8fafc;border-right:1px solid var(--border);padding:12px 0;}
@media(max-width:699px){.cat-sidebar{display:none;}}
.cat-head{font-size:10px;font-weight:800;color:var(--blue);text-transform:uppercase;letter-spacing:.08em;padding:0 12px 8px;border-bottom:2px solid var(--blue-light);margin-bottom:4px;}
.cat-btn{display:block;width:100%;text-align:left;padding:8px 12px;font-size:12px;color:var(--gray);background:none;border:none;cursor:pointer;border-left:3px solid transparent;font-family:inherit;transition:all .15s;line-height:1.4;}
.cat-btn:hover{color:var(--blue);background:#eff6ff;}
.cat-btn.active{color:var(--blue);border-left-color:var(--blue);background:#eff6ff;font-weight:700;}
.cat-divider{height:1px;background:var(--border);margin:6px 12px;}

/* MAIN */
.main-area{flex:1;min-width:0;padding:16px 16px 60px;}

/* SEARCH BAR */
.search-bar{display:flex;gap:8px;margin-bottom:16px;align-items:center;}
.search-input{flex:1;padding:10px 14px;border:1.5px solid var(--border);border-radius:10px;font-size:14px;font-family:inherit;background:#fff;}
.search-input:focus{outline:none;border-color:var(--blue-mid);}
.count-badge{font-size:12px;color:var(--gray);white-space:nowrap;}

/* STATUS FILTER */
.status-tabs{display:flex;gap:6px;margin-bottom:14px;flex-wrap:wrap;}
.stab{padding:5px 14px;border-radius:999px;border:1.5px solid var(--border);background:#fff;font-size:12px;font-weight:600;cursor:pointer;color:var(--gray);transition:all .15s;}
.stab.active{background:var(--blue);border-color:var(--blue);color:#fff;}

/* TABLE */
.tbl-wrap{overflow-x:auto;}
table{width:100%;border-collapse:collapse;font-size:13px;}
thead th{background:var(--blue-xl);color:var(--blue);font-weight:700;padding:9px 12px;text-align:left;border-bottom:2px solid var(--blue-light);white-space:nowrap;}
tbody tr{border-bottom:1px solid var(--border);transition:background .1s;}
tbody tr:hover{background:#f8fafc;}
tbody td{padding:10px 12px;vertical-align:middle;}
.cat-group-header td{background:var(--blue-xl);font-weight:800;font-size:12px;color:var(--blue);padding:7px 12px;border-bottom:1px solid var(--blue-light);}

/* BADGES */
.type-badge{display:inline-block;border-radius:999px;font-size:10px;font-weight:700;padding:2px 8px;white-space:nowrap;}
.type-badge.drug{background:var(--blue-xl);color:var(--blue);}
.type-badge.test{background:var(--teal-lt);color:var(--teal);}
.type-badge.proc{background:var(--amber-lt);color:var(--amber);}

.dx-cell{color:var(--text);font-weight:600;}
.dx-pending{color:var(--gray);font-style:italic;font-size:12px;}

.status-dot{display:inline-block;width:8px;height:8px;border-radius:50%;flex-shrink:0;}
.status-dot.done{background:var(--green);}
.status-dot.pending{background:var(--gray);}

/* EMPTY */
.empty{text-align:center;padding:40px;color:var(--gray);font-size:14px;}

/* MARK */
mark{background:#fef08a;border-radius:2px;padding:0 1px;}

/* UNIFIED HEADER */
.header{position:sticky!important;top:0;z-index:100;}
</style>
</head>

  {cat:"検査", name:"APTT", type:"test", dx:"", survey:"", note:"固定コメント要"},
  {cat:"検査", name:"LDL-C・TG・HDL-C（脂質4分画）", type:"test", dx:"", survey:"", note:""},
  {cat:"検査", name:"CBC（末梢血液一般）", type:"test", dx:"", survey:"", note:"時間外は時刻入力要"},
  {cat:"検査", name:"CRP", type:"test", dx:"", survey:"", note:"時間外は時刻入力要"},
  {cat:"検査", name:"尿一般検査", type:"test", dx:"", survey:"", note:"時間外は時刻入力要"},
  {cat:"検査", name:"インフルエンザ迅速検査", type:"test", dx:"", survey:"", note:"時間外は時刻入力要"},
  {cat:"検査", name:"SARS-CoV-2迅速検査", type:"test", dx:"", survey:"", note:"時間外は時刻入力要"},
  {cat:"検査", name:"ヘモグロビン（Hb）", type:"test", dx:"", survey:"", note:""},
  {cat:"検査", name:"クレアチニン・eGFR", type:"test", dx:"", survey:"", note:""},
  {cat:"検査", name:"肝機能（ALT・AST・γGTP）", type:"test", dx:"", survey:"", note:""},
  {cat:"検査", name:"甲状腺機能（TSH・FT3・FT4）", type:"test", dx:"", survey:"", note:""},

  {cat:"処置・管理", name:"生活習慣病管理料", type:"proc", dx:"", survey:"", note:"月1回（初回）算定可"},
  {cat:"処置・管理", name:"特定疾患療養管理料", type:"proc", dx:"", survey:"", note:"月2回まで"},
  {cat:"処置・管理", name:"地域包括診療料", type:"proc", dx:"", survey:"", note:"毎回算定・保険設定で確認"},
  {cat:"処置・管理", name:"認知症地域包括診療料", type:"proc", dx:"", survey:"", note:""},
  {cat:"処置・管理", name:"時間外緊急検査・レントゲン", type:"proc", dx:"—", survey:"", note:"時刻入力が必要。外注は対象外"},
];

let currentCat = "すべて", currentStatus = "all", currentQ = "";

function esc(s){ return s.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;"); }
function mark(s, q){
  if (!q) return esc(s);
  return esc(s).replace(new RegExp(esc(q).replace(/[.*+?^${}()|[\]\\]/g,"\\$&"), "gi"), m => `<mark>${m}</mark>`);
}

function filterCat(cat, btn){
  currentCat = cat;
  document.querySelectorAll(".cat-btn").forEach(b => b.classList.remove("active"));
  if (btn) btn.classList.add("active");
  render();
}
function filterStatus(st, btn){
  currentStatus = st;
  document.querySelectorAll(".stab").forEach(b => b.classList.remove("active"));
  btn.classList.add("active");
  render();
}

function render(){
  const q = document.getElementById("searchInput").value.trim().toLowerCase();
  currentQ = q;
  const tbody = document.getElementById("tableBody");

  let filtered = ITEMS.filter(d => {
    if (currentCat !== "すべて" && d.cat !== currentCat) return false;
    if (currentStatus === "pending" && d.dx) return false;
    if (currentStatus === "done" && !d.dx) return false;
    if (q && !d.name.toLowerCase().includes(q) && !d.dx.toLowerCase().includes(q) &&
        !d.cat.toLowerCase().includes(q) && !d.note.toLowerCase().includes(q)) return false;
    return true;
  });

  document.getElementById("countBadge").textContent = `${filtered.length} 件`;
  document.getElementById("emptyMsg").style.display = filtered.length === 0 ? "block" : "none";

  // Group by category
  const groups = {};
  filtered.forEach(d => { if (!groups[d.cat]) groups[d.cat] = []; groups[d.cat].push(d); });

  let html = "";
  Object.entries(groups).forEach(([cat, items]) => {
    if (currentCat === "すべて") {
      html += `<tr class="cat-group-header"><td colspan="6">📂 ${esc(cat)}</td></tr>`;
    }
    items.forEach(d => {
      const typeLabel = d.type === "drug" ? "薬剤" : d.type === "test" ? "検査" : "処置・管理";
      const typeClass = d.type === "drug" ? "drug" : d.type === "test" ? "test" : "proc";
      const dxHtml = d.dx
        ? `<span class="dx-cell">${mark(d.dx, q)}</span>`
        : `<span class="dx-pending">入力待ち</span>`;
      const dot = d.dx ? "done" : "pending";
      html += `<tr>
        <td><span class="status-dot ${dot}"></span></td>
        <td>${mark(d.name, q)}</td>
        <td><span class="type-badge ${typeClass}">${typeLabel}</span></td>
        <td>${dxHtml}</td>
        <td style="font-size:11px;color:var(--gray)">${esc(d.survey)}</td>
        <td style="font-size:11px;color:var(--gray-mid../.gray)">${mark(d.note, q)}</td>
      </tr>`;
    });
  });
  tbody.innerHTML = html;
}

render();
</script>

</html>
