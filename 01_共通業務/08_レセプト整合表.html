<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>いなだ医院｜レセプト整合表</title>
<style>
:root{--blue:#1558a0;--blue-mid:#1e74c8;--blue-light:#dbeafe;--blue-xl:#eff6ff;--teal:#0d9488;--teal-lt:#ccfbf1;--amber:#d97706;--amber-lt:#fef3c7;--green:#16a34a;--green-lt:#dcfce7;--red:#dc2626;--red-lt:#fee2e2;--gray:#64748b;--gray-lt:#f1f5f9;--border:#e2e8f0;--text:#0f172a;--bg:#f0f4f8;--white:#fff;--r:12px;--r-sm:8px;--sh:0 1px 4px rgba(0,0,0,.08);}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
body{font-family:-apple-system,BlinkMacSystemFont,"Hiragino Sans","Noto Sans JP",sans-serif;font-size:15px;color:var(--text);background:var(--bg);}
.header{background:linear-gradient(135deg,#0f3d6e,#1558a0,#1e74c8);padding:0 16px;min-height:56px;display:flex;align-items:center;position:sticky;top:0;z-index:100;}
.header-inner{position:relative;display:flex;align-items:center;width:100%;max-width:1100px;margin:0 auto;padding:10px 0 10px 110px;}
.back-link{position:absolute!important;left:0!important;top:50%!important;transform:translateY(-50%)!important;display:inline-flex!important;align-items:center;gap:5px;color:rgba(255,255,255,.92)!important;font-size:12px!important;font-weight:600;text-decoration:none;background:rgba(255,255,255,.18)!important;border:1px solid rgba(255,255,255,.3)!important;border-radius:20px;padding:6px 13px!important;white-space:nowrap;}
.header-logo{height:28px;filter:brightness(0) invert(1);opacity:.9;display:block;margin:0 auto 3px;}
.header h1{font-size:16px;font-weight:800;color:#fff;margin:0;}
.header .sub{font-size:10px;color:rgba(255,255,255,.65);}
.page-layout{display:flex;max-width:1100px;margin:0 auto;}
.d-sidebar{width:190px;flex-shrink:0;position:sticky;top:56px;height:calc(100vh - 56px);overflow-y:auto;background:#f8fafc;border-right:1px solid var(--border);padding:12px 0;}
@media(max-width:699px){.d-sidebar{display:none;}}
.d-sidebar-head{font-size:10px;font-weight:800;color:var(--blue);text-transform:uppercase;letter-spacing:.08em;padding:0 12px 8px;border-bottom:2px solid var(--blue-light);margin-bottom:4px;}
.d-btn{display:block;width:100%;text-align:left;padding:9px 12px;font-size:13px;color:var(--gray);background:none;border:none;cursor:pointer;border-left:3px solid transparent;font-family:inherit;transition:all .15s;}
.d-btn:hover{color:var(--blue);background:#eff6ff;}
.d-btn.active{color:var(--blue);border-left-color:var(--blue);background:#eff6ff;font-weight:700;}
.main-area{flex:1;min-width:0;padding:16px 16px 60px;}
.search-bar{display:flex;gap:8px;margin-bottom:14px;align-items:center;}
.search-input{flex:1;padding:9px 14px;border:1.5px solid var(--border);border-radius:10px;font-size:14px;font-family:inherit;background:#fff;}
.search-input:focus{outline:none;border-color:var(--blue-mid);}
.d-title{font-size:18px;font-weight:800;color:var(--blue);margin-bottom:16px;display:flex;align-items:center;gap:10px;}
.d-badge{font-size:11px;background:var(--blue-xl);color:var(--blue);padding:3px 10px;border-radius:999px;font-weight:600;}
.section-card{background:#fff;border-radius:var(--r);box-shadow:var(--sh);margin-bottom:14px;overflow:hidden;}
.section-head{display:flex;align-items:center;gap:8px;padding:12px 16px;font-size:14px;font-weight:700;border-bottom:1px solid var(--border);}
.section-head.blue{background:var(--blue-xl);border-left:5px solid var(--blue-mid);}
.section-head.teal{background:var(--teal-lt);border-left:5px solid var(--teal);}
.section-head.green{background:var(--green-lt);border-left:5px solid var(--green);}
.item-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:6px;padding:12px 16px;}
.item-chip{background:var(--gray-lt);border-radius:var(--r-sm);padding:7px 12px;font-size:12px;color:var(--text);border-left:3px solid var(--border);}
.item-chip.match{background:#eff6ff;border-left-color:var(--blue-mid);color:var(--blue);font-weight:600;}
mark{background:#fef08a;border-radius:2px;padding:0 1px;}
.drug-info{padding:12px 16px;font-size:13px;color:var(--gray);}
.empty-msg{text-align:center;padding:60px;color:var(--gray);font-size:14px;}
.mobile-d-select{display:none;width:100%;padding:10px;border:1.5px solid var(--border);border-radius:10px;font-size:14px;margin-bottom:14px;font-family:inherit;}
@media(max-width:699px){.mobile-d-select{display:block;}}
</style>
</head>
<body>

<header class="header">
  <div class="header-inner">
    <a href="../index.html" class="back-link">← 一覧</a>
    <div>
      <img src="../assets/logo.png" class="header-logo" alt="いなだ医院">
      <h1>📋 レセプト整合表</h1>
      <div class="sub">傷病名ごとに使える検査・管理料・薬の一覧</div>
    </div>
  </div>
</header>

<div class="page-layout">
  <nav class="d-sidebar">
    <div class="d-sidebar-head">傷病名</div>
    <button class="d-btn" onclick="showDisease(\"高血圧症\",this)">高血圧症</button>
    <button class="d-btn" onclick="showDisease(\"高脂血症\",this)">高脂血症</button>
    <button class="d-btn" onclick="showDisease(\"高コレステロール血症\",this)">高コレステロール血症</button>
    <button class="d-btn" onclick="showDisease(\"糖尿病\",this)">糖尿病</button>
    <button class="d-btn" onclick="showDisease(\"高尿酸血症\",this)">高尿酸血症</button>
    <button class="d-btn" onclick="showDisease(\"腎機能低下\",this)">腎機能低下</button>
    <button class="d-btn" onclick="showDisease(\"肝機能障害\",this)">肝機能障害</button>
    <button class="d-btn" onclick="showDisease(\"膵炎\",this)">膵炎</button>
    <button class="d-btn" onclick="showDisease(\"腰痛症\",this)">腰痛症</button>
    <button class="d-btn" onclick="showDisease(\"インフルエンザ\",this)">インフルエンザ</button>
    <button class="d-btn" onclick="showDisease(\"マイコプラズマ感染症\",this)">マイコプラズマ感染症</button>
    <button class="d-btn" onclick="showDisease(\"ＣＯＶＩＤ－１９\",this)">ＣＯＶＩＤ－１９</button>
  </nav>

  <div class="main-area">
    <div class="search-bar">
      <input type="text" class="search-input" id="searchQ" placeholder="検査名・項目名で絞り込み..." oninput="applyFilter()">
    </div>

    <select class="mobile-d-select" id="mobileSelect" onchange="showDisease(this.value,null)">
      <option value="">-- 傷病名を選択 --</option>
      <option value="高血圧症">高血圧症</option><option value="高脂血症">高脂血症</option><option value="高コレステロール血症">高コレステロール血症</option><option value="糖尿病">糖尿病</option><option value="高尿酸血症">高尿酸血症</option><option value="腎機能低下">腎機能低下</option><option value="肝機能障害">肝機能障害</option><option value="膵炎">膵炎</option><option value="腰痛症">腰痛症</option><option value="インフルエンザ">インフルエンザ</option><option value="マイコプラズマ感染症">マイコプラズマ感染症</option><option value="ＣＯＶＩＤ－１９">ＣＯＶＩＤ－１９</option>
    </select>

    <div id="mainContent">
      <div class="empty-msg">左の傷病名をタップして内容を確認してください</div>
    </div>
  </div>
</div>

let currentDisease = null;

function esc(s){ return s.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;"); }

function mark(s, q){
  if (!q) return esc(s);
  return esc(s).replace(new RegExp(esc(q).replace(/[.*+?^${}()|[\]\\]/g,"\\$&"),"gi"), m => `<mark>${m}</mark>`);
}

function showDisease(name, btn){
  currentDisease = name;
  document.querySelectorAll(".d-btn").forEach(b => b.classList.remove("active"));
  if (btn) btn.classList.add("active");
  var sel = document.getElementById("mobileSelect");
  if (sel) sel.value = name;
  applyFilter();
}

function applyFilter(){
  var q = document.getElementById("searchQ").value.trim().toLowerCase();
  var d = DISEASES[currentDisease];
  var el = document.getElementById("mainContent");

  if (!d){
    el.innerHTML = '<div class="empty-msg">左の傷病名をタップして内容を確認してください</div>';
    return;
  }

  var filterFn = item => !q || item.toLowerCase().includes(q);

  var tests  = d.tests.filter(filterFn);
  var mgmts  = d.mgmt.filter(filterFn);

  var html = `<div class="d-title">📌 ${esc(currentDisease)}
    <span class="d-badge">薬剤 ${d.drug_count}種対応</span>
  </div>`;

  // 検査セクション
  if (tests.length > 0){
    html += '<div class="section-card"><div class="section-head blue">🔬 検査（' + tests.length + '件）</div><div class="item-grid">';
    tests.forEach(t => html += `<div class="item-chip${q && t.toLowerCase().includes(q)?" match":""}">${mark(t,q)}</div>`);
    html += '</div></div>';
  }

  // 管理料・指導セクション
  if (mgmts.length > 0){
    var maxShow = 30;
    var shown = mgmts.slice(0, maxShow);
    html += '<div class="section-card"><div class="section-head teal">📋 管理料・指導・処置（' + mgmts.length + '件）</div><div class="item-grid">';
    shown.forEach(m => html += `<div class="item-chip${q && m.toLowerCase().includes(q)?" match":""}">${mark(m,q)}</div>`);
    if (mgmts.length > maxShow) html += `<div class="item-chip" style="color:var(--gray);font-style:italic">他 ${mgmts.length-maxShow} 件...</div>`;
    html += '</div></div>';
  }

  // 薬剤（採用薬リストへのリンク）
  html += `<div class="section-card"><div class="section-head green">💊 対応薬剤</div>
    <div class="drug-info">この傷病名で算定できる薬剤は <strong>${d.drug_count}種</strong> あります。<br>
    各薬剤の詳細は <a href="03b_採用薬リスト.html" style="color:var(--blue-mid);font-weight:700;">採用薬リスト</a> を確認してください。</div></div>`;

  if (tests.length === 0 && mgmts.length === 0){
    html += '<div class="empty-msg">絞り込み条件に一致する項目がありません</div>';
  }

  el.innerHTML = html;
}

// 初期表示
showDisease("高血圧症", document.querySelector(".d-btn"));
</script>
