<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>いなだ医院｜採用薬リスト</title>
<style>
:root {
  --blue:        #1558a0;
  --blue-mid:    #1e74c8;
  --blue-light:  #dbeafe;
  --teal:        #0d9488;
  --teal-light:  #ccfbf1;
  --amber:       #d97706;
  --amber-light: #fef3c7;
  --red:         #dc2626;
  --red-light:   #fee2e2;
  --green:       #16a34a;
  --green-light: #dcfce7;
  --purple:      #7c3aed;
  --purple-light:#ede9fe;
  --gray:        #64748b;
  --gray-light:  #f1f5f9;
  --border:      #e2e8f0;
  --text:        #0f172a;
  --bg:          #f0f4f8;
  --white:       #ffffff;
  --radius:      10px;
  --shadow-sm:   0 1px 3px rgba(0,0,0,.08);
  --shadow:      0 4px 12px rgba(0,0,0,.1);
  --sidebar-w:   200px;
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { scroll-behavior: smooth; }
body {
  font-family: -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Noto Sans JP", sans-serif;
  font-size: 15px; line-height: 1.75;
  color: var(--text); background: var(--bg);
}

/* ── HEADER ── */
.header {
  background: linear-gradient(135deg, #0f3d6e 0%, #1558a0 60%, #1e74c8 100%);
  padding: 16px 20px 14px; position: relative; overflow: hidden;
}
.header::after {
  content:''; position:absolute; inset:0;
  background:url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='%23ffffff' fill-opacity='0.03'%3E%3Cpath d='M36 34v-4h-2v4h-4v2h4v4h2v-4h4v-2h-4zm0-30V0h-2v4h-4v2h4v4h2V6h4V4h-4zM6 34v-4H4v4H0v2h4v4h2v-4h4v-2H6zM6 4V0H4v4H0v2h4v4h2V6h4V4H6z'/%3E%3C/g%3E%3C/svg%3E");
  pointer-events:none;
}
.header-inner { position:relative; z-index:1; display:flex; align-items:center; gap:12px; max-width:1100px; margin:0 auto; }
.back-link {
  color:rgba(255,255,255,.75); font-size:12px; text-decoration:none;
  display:flex; align-items:center; gap:4px; white-space:nowrap;
}
.back-link:hover { color:#fff; }
.header-title { flex:1; }
.header-title h1 { color:#fff; font-size:17px; font-weight:800; }
.header-title .sub { color:rgba(255,255,255,.6); font-size:11px; }
.header-count { color:rgba(255,255,255,.8); font-size:12px; white-space:nowrap; }

/* ── PAGE LAYOUT ── */
.page-layout { display:flex; align-items:flex-start; max-width:1100px; margin:0 auto; }

/* ── LEFT SIDEBAR ── */
.cat-sidebar {
  display:none;
  width:var(--sidebar-w);
  flex-shrink:0;
  position:sticky;
  top:0;
  height:100vh;
  overflow-y:auto;
  background:var(--white);
  border-right:1px solid var(--border);
  padding:12px 0 20px;
  scrollbar-width:thin;
}
@media(min-width:860px){ .cat-sidebar{ display:block; } }

.sidebar-all {
  display:block; width:100%; text-align:left;
  padding:8px 16px; font-size:13px; font-weight:700;
  background:none; border:none; cursor:pointer; color:var(--text);
  border-left:3px solid transparent;
}
.sidebar-all.active { color:var(--blue); border-left-color:var(--blue); background:var(--blue-light); }
.sidebar-all:hover:not(.active) { background:var(--gray-light); }

.cat-group { border-bottom:1px solid var(--border); }
.cat-group-btn {
  display:flex; align-items:center; justify-content:space-between;
  width:100%; padding:8px 14px; font-size:12px; font-weight:700;
  color:var(--gray); text-transform:uppercase; letter-spacing:.04em;
  background:none; border:none; cursor:pointer;
}
.cat-group-btn:hover { color:var(--text); }
.cat-group-btn .arrow { font-size:10px; transition:transform .15s; }
.cat-group-btn.open .arrow { transform:rotate(90deg); }

.cat-sub-list { display:none; }
.cat-sub-list.open { display:block; }
.cat-sub-btn {
  display:block; width:100%; text-align:left;
  padding:5px 14px 5px 22px; font-size:12.5px;
  background:none; border:none; cursor:pointer; color:var(--text);
  border-left:3px solid transparent;
}
.cat-sub-btn:hover { background:var(--gray-light); }
.cat-sub-btn.active { color:var(--blue); border-left-color:var(--blue); background:var(--blue-light); font-weight:600; }
.cat-sub-count { float:right; font-size:11px; color:var(--gray); font-weight:400; }

/* ── MAIN AREA ── */
.main-area { flex:1; min-width:0; }

/* ── SEARCH BAR ── */
.search-bar {
  background:var(--white); border-bottom:1px solid var(--border);
  position:sticky; top:0; z-index:50; padding:10px 16px;
}
.search-wrap { display:flex; align-items:center; gap:8px; }
.search-input-row {
  flex:1; display:flex; align-items:center; gap:8px;
  background:var(--gray-light); border:1.5px solid var(--border);
  border-radius:8px; padding:0 12px;
  transition:border-color .15s;
}
.search-input-row:focus-within { border-color:var(--blue-mid); }
.search-icon { color:var(--gray); font-size:14px; }
.search-input {
  flex:1; border:none; background:transparent;
  font-size:14px; padding:9px 0; outline:none; color:var(--text);
}
.search-input::placeholder { color:#aaa; }
.search-clear {
  background:none; border:none; color:var(--gray);
  font-size:16px; cursor:pointer; line-height:1;
  display:none;
}
.search-clear.show { display:block; }

/* モバイル用カテゴリトグル */
.cat-toggle-btn {
  display:flex; align-items:center; gap:4px;
  padding:8px 12px; border-radius:8px; font-size:12px; font-weight:600;
  background:var(--gray-light); border:1.5px solid var(--border);
  cursor:pointer; color:var(--text); white-space:nowrap;
}
.cat-toggle-btn.has-filter { background:var(--blue-light); border-color:var(--blue); color:var(--blue); }
@media(min-width:860px){ .cat-toggle-btn{ display:none; } }

/* モバイルカテゴリパネル */
.mobile-cat-panel {
  display:none;
  background:var(--white); border-bottom:1px solid var(--border);
  padding:12px 16px; max-height:320px; overflow-y:auto;
}
.mobile-cat-panel.open { display:block; }
@media(min-width:860px){ .mobile-cat-panel{ display:none !important; } }

.mobile-group-label {
  font-size:11px; font-weight:700; color:var(--gray); text-transform:uppercase;
  letter-spacing:.05em; margin:10px 0 6px;
}
.mobile-group-label:first-child { margin-top:0; }
.mobile-chips { display:flex; flex-wrap:wrap; gap:5px; margin-bottom:4px; }
.mobile-chip {
  padding:4px 11px; border-radius:16px; font-size:12px; font-weight:600;
  cursor:pointer; border:1.5px solid var(--border); background:var(--white); color:var(--gray);
}
.mobile-chip.active { background:var(--blue); color:#fff; border-color:var(--blue); }

/* ── RESULT META ── */
.result-meta {
  padding:10px 16px 4px;
  display:flex; align-items:center; gap:8px; flex-wrap:wrap;
}
.result-count { font-size:12px; color:var(--gray); }
.result-count strong { color:var(--blue); }
.active-filter {
  display:inline-flex; align-items:center; gap:4px;
  font-size:11px; font-weight:600; color:var(--blue);
  background:var(--blue-light); border-radius:12px; padding:2px 8px;
}
.active-filter .rm { cursor:pointer; font-size:13px; line-height:1; color:var(--blue-mid); }

/* ── DRUG LIST ── */
.drug-list { padding:0 12px 60px; }

/* ── DRUG CARD ── */
.drug-card {
  background:var(--white); border-radius:var(--radius);
  box-shadow:var(--shadow-sm); margin-bottom:8px; overflow:hidden;
  border-left:4px solid #cbd5e1;
  cursor:pointer;
}
.drug-card:hover { box-shadow:var(--shadow); }
.drug-card.special-管理 { border-left-color:var(--purple); }
.drug-card.special-冷所 { border-left-color:var(--teal); }
.drug-card.special-劇薬 { border-left-color:var(--amber); }
.drug-card.open { border-left-color:var(--blue-mid); }

.drug-head {
  display:flex; align-items:center; gap:8px;
  padding:10px 14px;
}
.drug-name-block { flex:1; min-width:0; }
.drug-main-name { font-size:14px; font-weight:700; }
.drug-brand-name { font-size:11px; color:var(--gray); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
.drug-badges { display:flex; gap:4px; flex-shrink:0; align-items:center; }
.badge {
  display:inline-block; font-size:10px; font-weight:700;
  padding:2px 7px; border-radius:12px; line-height:1.5; white-space:nowrap;
}
.badge-special { background:var(--purple-light); color:var(--purple); }
.badge-cold    { background:var(--teal-light);   color:var(--teal); }
.badge-gekiyaku{ background:var(--amber-light);  color:var(--amber); }
.drug-chevron { color:var(--gray); font-size:12px; transition:transform .2s; }
.drug-card.open .drug-chevron { transform:rotate(90deg); color:var(--blue); }

/* ── DRUG DESC (collapsed: 1 line preview) ── */
.drug-preview {
  padding:0 14px 10px; font-size:12.5px; color:var(--gray);
  overflow:hidden; white-space:nowrap; text-overflow:ellipsis;
}
.drug-card.open .drug-preview { display:none; }

/* ── DRUG BODY (expanded) ── */
.drug-body {
  display:none; padding:0 14px 12px; border-top:1px solid var(--border);
}
.drug-card.open .drug-body { display:block; }
.drug-cat-label {
  font-size:11px; font-weight:700; color:var(--gray); margin-bottom:6px;
  text-transform:uppercase; letter-spacing:.04em;
}
.drug-desc { font-size:13.5px; color:var(--text); line-height:1.65; margin-bottom:8px; }
.drug-note {
  display:flex; gap:6px; font-size:12px;
  background:var(--amber-light); border-left:3px solid var(--amber);
  border-radius:4px; padding:7px 10px; color:#92400e; line-height:1.55;
}

/* ── EMPTY ── */
.empty { text-align:center; padding:60px 20px; color:var(--gray); }
.empty .icon { font-size:40px; margin-bottom:12px; }
.empty p { font-size:14px; }

/* ── BACK TO TOP ── */
.to-top {
  position:fixed; right:16px; bottom:20px;
  width:40px; height:40px; border-radius:50%;
  background:var(--blue); color:#fff; border:none;
  font-size:18px; cursor:pointer;
  box-shadow:0 4px 12px rgba(21,88,160,.4); z-index:100;
  display:flex; align-items:center; justify-content:center;
  opacity:0; transform:translateY(8px);
  transition:opacity .2s, transform .2s; pointer-events:none;
}
.to-top.show { opacity:1; transform:translateY(0); pointer-events:auto; }
</style>
</head>
<body>

<header class="header">
  <div class="header-inner">
    <a href="03_薬局.html" class="back-link">← 薬局マニュアル</a>
    <div class="header-title">
      <h1>💊 採用薬リスト</h1>
      <div class="sub">薬の種類・説明・注意点　非専門家向け早見表</div>
    </div>
    <div class="header-count" id="headerCount"></div>
  </div>
</header>

<div class="page-layout">

  <!-- ── LEFT SIDEBAR (PC) ── -->
  <nav class="cat-sidebar" id="catSidebar">
    <button class="sidebar-all active" id="sidebarAll" onclick="selectCat('すべて')">📋 すべて</button>
    <div id="sidebarGroups"></div>
  </nav>

  <div class="main-area">

    <!-- ── SEARCH BAR ── -->
    <div class="search-bar">
      <div class="search-wrap">
        <div class="search-input-row">
          <span class="search-icon">🔍</span>
          <input class="search-input" id="searchInput" type="search"
                 placeholder="薬名・成分・効果・注意点で検索..." autocomplete="off"
                 oninput="onSearch()" oncompositionupdate="onSearch()" oncompositionend="onSearch()">
          <button class="search-clear" id="searchClear" onclick="clearSearch()">✕</button>
        </div>
        <button class="cat-toggle-btn" id="catToggleBtn" onclick="toggleMobileCat()">
          <span>☰</span><span id="catToggleLabel">カテゴリ</span>
        </button>
      </div>
    </div>

    <!-- ── MOBILE CATEGORY PANEL ── -->
    <div class="mobile-cat-panel" id="mobileCatPanel"></div>

    <!-- ── RESULT META ── -->
    <div class="result-meta" id="resultMeta"></div>

    <!-- ── DRUG LIST ── -->
    <div class="drug-list" id="drugList"></div>
    <div class="empty" id="emptyState" style="display:none">
      <div class="icon">🔍</div>
      <p>「<strong id="emptyQuery"></strong>」に一致する薬が見つかりませんでした。<br>
      <small style="color:#94a3b8">別のキーワードを試してください。</small></p>
    </div>

  </div><!-- /main-area -->
</div><!-- /page-layout -->

<button class="to-top" id="toTop" onclick="window.scrollTo({top:0,behavior:'smooth'})" title="トップへ">↑</button>

/* ── カテゴリグループ定義 ── */
const CAT_GROUPS = [
  { label:"循環器・血圧",      cats:["高血圧","心臓・循環器","抗凝固薬","利尿薬"] },
  { label:"代謝・内分泌",      cats:["糖尿病","インスリン","高脂血症","甲状腺","痛風・高尿酸血症"] },
  { label:"消化器",            cats:["胃腸・消化器","便秘"] },
  { label:"痛み・神経痛",      cats:["鎮痛・解熱","神経障害疼痛","片頭痛"] },
  { label:"アレルギー・呼吸器",cats:["アレルギー","呼吸器","吸入薬（喘息）","吸入薬（COPD）","吸入薬（発作時）"] },
  { label:"感染症",            cats:["抗生物質","抗菌（結核）","抗インフルエンザ","抗ウイルス（帯状疱疹）","抗ウイルス（肝炎）"] },
  { label:"精神・神経科",      cats:["精神・抗うつ","精神・抗精神病","抗不安薬","睡眠薬","認知症","神経・脳循環","パーキンソン","抗てんかん"] },
  { label:"泌尿器・骨・関節",  cats:["泌尿器","骨・ミネラル","骨粗鬆症","関節リウマチ","ステロイド"] },
  { label:"外用・皮膚科",      cats:["皮膚科外用","外用鎮痛","眼科","耳鼻科","坐剤"] },
  { label:"漢方・ワクチン",    cats:["漢方","ワクチン"] },
  { label:"その他",            cats:["止血薬","禁煙補助","爪白癬","消毒・うがい","その他（小児）","その他"] },
];

/* ── 状態 ── */
let currentCat = "すべて";
let currentQ   = "";
let mobilePanelOpen = false;

/* ── 薬品数カウント（カテゴリ別） ── */
const catCount = {};
DRUGS.forEach(d => { catCount[d.category] = (catCount[d.category] || 0) + 1; });

/* ── サイドバー構築 ── */
function buildSidebar() {
  const container = document.getElementById("sidebarGroups");
  CAT_GROUPS.forEach((g, gi) => {
    const groupEl = document.createElement("div");
    groupEl.className = "cat-group";

    const btn = document.createElement("button");
    btn.className = "cat-group-btn open";
    btn.innerHTML = `<span>${g.label}</span><span class="arrow">▶</span>`;
    btn.onclick = () => {
      btn.classList.toggle("open");
      subList.classList.toggle("open");
    };

    const subList = document.createElement("div");
    subList.className = "cat-sub-list open";

    g.cats.forEach(cat => {
      const cnt = catCount[cat] || 0;
      if (cnt === 0) return;
      const sub = document.createElement("button");
      sub.className = "cat-sub-btn";
      sub.dataset.cat = cat;
      sub.innerHTML = `${escHtml(cat)}<span class="cat-sub-count">${cnt}</span>`;
      sub.onclick = () => selectCat(cat);
      subList.appendChild(sub);
    });

    if (subList.children.length === 0) return;
    groupEl.appendChild(btn);
    groupEl.appendChild(subList);
    container.appendChild(groupEl);
  });
}

/* ── モバイルパネル構築 ── */
function buildMobilePanel() {
  const panel = document.getElementById("mobileCatPanel");
  const allBtn = document.createElement("button");
  allBtn.className = "mobile-chip" + (currentCat === "すべて" ? " active" : "");
  allBtn.dataset.cat = "すべて";
  allBtn.textContent = "すべて";
  allBtn.onclick = () => { selectCat("すべて"); toggleMobileCat(); };
  panel.appendChild(allBtn);

  CAT_GROUPS.forEach(g => {
    const label = document.createElement("div");
    label.className = "mobile-group-label";
    label.textContent = g.label;
    const chips = document.createElement("div");
    chips.className = "mobile-chips";
    let hasAny = false;
    g.cats.forEach(cat => {
      const cnt = catCount[cat] || 0;
      if (cnt === 0) return;
      hasAny = true;
      const chip = document.createElement("button");
      chip.className = "mobile-chip" + (cat === currentCat ? " active" : "");
      chip.dataset.cat = cat;
      chip.textContent = `${cat} (${cnt})`;
      chip.onclick = () => { selectCat(cat); toggleMobileCat(); };
      chips.appendChild(chip);
    });
    if (!hasAny) return;
    panel.appendChild(label);
    panel.appendChild(chips);
  });
}

function toggleMobileCat() {
  mobilePanelOpen = !mobilePanelOpen;
  document.getElementById("mobileCatPanel").classList.toggle("open", mobilePanelOpen);
}

function selectCat(cat) {
  currentCat = cat;
  // サイドバー更新
  document.querySelectorAll(".cat-sub-btn").forEach(b =>
    b.classList.toggle("active", b.dataset.cat === cat));
  document.getElementById("sidebarAll").classList.toggle("active", cat === "すべて");
  // モバイルチップ更新
  document.querySelectorAll(".mobile-chip").forEach(b =>
    b.classList.toggle("active", b.dataset.cat === cat));
  // トグルボタンラベル
  document.getElementById("catToggleLabel").textContent = cat === "すべて" ? "カテゴリ" : cat;
  document.getElementById("catToggleBtn").classList.toggle("has-filter", cat !== "すべて");
  render();
}

function onSearch() {
  currentQ = document.getElementById("searchInput").value.trim();
  document.getElementById("searchClear").classList.toggle("show", currentQ.length > 0);
  render();
}

function clearSearch() {
  document.getElementById("searchInput").value = "";
  currentQ = "";
  document.getElementById("searchClear").classList.remove("show");
  render();
}

function render() {
  const q = norm(currentQ);
  const filtered = DRUGS.filter(d => {
    const catOk = currentCat === "すべて" || d.category === currentCat;
    const qOk = !q || [d.name, d.brand, d.category, d.desc, d.note]
                       .some(s => norm(s).includes(q));
    return catOk && qOk;
  });

  const list  = document.getElementById("drugList");
  const empty = document.getElementById("emptyState");
  const meta  = document.getElementById("resultMeta");

  // ヘッダーカウント
  document.getElementById("headerCount").textContent = `${DRUGS.length} 品目`;

  if (filtered.length === 0) {
    list.innerHTML = "";
    empty.style.display = "block";
    document.getElementById("emptyQuery").textContent = currentQ || currentCat;
    meta.innerHTML = "";
  } else {
    empty.style.display = "none";
    // メタ行
    let metaHtml = `<span class="result-count"><strong>${filtered.length}</strong> 件表示</span>`;
    if (currentCat !== "すべて") {
      metaHtml += `<span class="active-filter">${escHtml(currentCat)}
        <span class="rm" onclick="selectCat('すべて')">✕</span></span>`;
    }
    if (currentQ) {
      metaHtml += `<span class="active-filter">「${escHtml(currentQ)}」で検索中
        <span class="rm" onclick="clearSearch()">✕</span></span>`;
    }
    meta.innerHTML = metaHtml;
    list.innerHTML = filtered.map(drugCard).join("");
  }
}

function drugCard(d) {
  const sc = d.special ? ` special-${d.special}` : "";
  const sb = d.special === "管理"  ? `<span class="badge badge-special">⚠管理</span>`
           : d.special === "冷所"  ? `<span class="badge badge-cold">❄冷所</span>`
           : d.special === "劇薬" ? `<span class="badge badge-gekiyaku">⚠劇薬</span>`
           : "";
  const noteHtml = d.note
    ? `<div class="drug-note"><span>⚠️</span><span>${highlight(d.note)}</span></div>`
    : "";
  return `
<div class="drug-card${sc}" onclick="toggleCard(this)">
  <div class="drug-head">
    <div class="drug-name-block">
      <div class="drug-main-name">${highlight(d.name)}</div>
      ${d.brand ? `<div class="drug-brand-name">🏷 ${highlight(d.brand)}</div>` : ""}
    </div>
    <div class="drug-badges">${sb}</div>
    <span class="drug-chevron">▶</span>
  </div>
  <div class="drug-preview">${highlight(d.desc)}</div>
  <div class="drug-body">
    <div class="drug-cat-label">${escHtml(d.category)}</div>
    <div class="drug-desc">${highlight(d.desc)}</div>
    ${noteHtml}
  </div>
</div>`;
}

function toggleCard(el) {
  el.classList.toggle("open");
}

/* ひらがな→カタカナ変換（U+3041〜U+3096 → +0x60） */
function hira2kata(s) {
  return (s||"").replace(/[ぁ-ゖ]/g, c => String.fromCharCode(c.charCodeAt(0) + 0x60));
}
/* カタカナ→ひらがな変換 */
function kata2hira(s) {
  return (s||"").replace(/[ァ-ヶ]/g, c => String.fromCharCode(c.charCodeAt(0) - 0x60));
}
/* 検索正規化：ひらがな・カタカナを統一してlowerCase */
function norm(s) {
  return hira2kata((s||"").toLowerCase());
}

function highlight(text) {
  if (!currentQ || !text) return escHtml(text||"");
  const esc = escHtml(text);
  // ひらがなでもカタカナでもマッチするよう両形式でハイライト
  const kata = hira2kata(currentQ).replace(/[.*+?^${}()|[\]\\]/g, "\\$&");
  const hira = kata2hira(currentQ).replace(/[.*+?^${}()|[\]\\]/g, "\\$&");
  const pat  = kata === hira ? kata : `${kata}|${hira}`;
  return esc.replace(new RegExp(pat, "gi"), m => `<mark style="background:#fef08a;border-radius:2px">${m}</mark>`);
}

function escHtml(s) {
  return (s||"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");
}

window.addEventListener("scroll", () => {
  document.getElementById("toTop").classList.toggle("show", window.scrollY > 300);
});

document.addEventListener("DOMContentLoaded", () => {
  buildSidebar();
  buildMobilePanel();
  render();
});
</script>
