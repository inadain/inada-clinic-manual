<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>いなだ医院｜レセプト</title>
<style>
:root{--blue:#1558a0;--blue-mid:#1e74c8;--blue-light:#dbeafe;--blue-xlight:#eff6ff;--amber:#d97706;--amber-light:#fef3c7;--gray:#64748b;--gray-light:#f1f5f9;--border:#e2e8f0;--text:#0f172a;--bg:#f0f4f8;--white:#ffffff;--radius:12px;--shadow-sm:0 1px 3px rgba(0,0,0,.08);}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
body{font-family:-apple-system,BlinkMacSystemFont,"Hiragino Sans","Noto Sans JP",sans-serif;font-size:15px;line-height:1.75;color:var(--text);background:var(--bg);}
.header{background:linear-gradient(135deg,#0f3d6e 0%,#1558a0 60%,#1e74c8 100%);padding:20px 20px 16px;text-align:center;position:relative;overflow:hidden;}
.header-inner{position:relative;z-index:1;}
.header-tag{display:inline-block;background:rgba(255,255,255,.18);border:1px solid rgba(255,255,255,.3);color:#fff;font-size:11px;font-weight:700;padding:3px 12px;border-radius:20px;letter-spacing:.08em;margin-bottom:8px;}
.header h1{color:#fff;font-size:19px;font-weight:800;letter-spacing:.03em;margin-bottom:3px;}
.header .sub{color:rgba(255,255,255,.7);font-size:11px;}
.back-link {
  position: absolute; left: 14px; top: 14px; z-index: 2;
  display: inline-flex; align-items: center; gap: 5px;
  color: rgba(255,255,255,.92); font-size: 12px; font-weight: 600; text-decoration: none;
  background: rgba(255,255,255,.18); border: 1px solid rgba(255,255,255,.3);
  border-radius: 20px; padding: 5px 12px; transition: background .15s;
}
.back-link:hover { background: rgba(255,255,255,.3); color: #fff; }
.main{max-width:700px;margin:0 auto;padding:32px 16px 60px;}
.pending{background:var(--amber-light);border:2px dashed var(--amber);border-radius:var(--radius);padding:32px 20px;text-align:center;margin-bottom:20px;}
.pending .icon{font-size:48px;margin-bottom:12px;}
.pending h2{color:var(--amber);font-size:1.1rem;margin-bottom:8px;}
.pending p{font-size:13px;color:#92400e;line-height:1.7;}
.flow-card{background:var(--white);border-radius:var(--radius);box-shadow:var(--shadow-sm);padding:20px;margin-bottom:14px;}
.flow-card h3{font-size:.9rem;font-weight:700;color:var(--blue);margin-bottom:10px;border-left:3px solid var(--blue-mid);padding-left:8px;}
.flow-card p{font-size:13px;color:var(--gray);line-height:1.7;}

/* ── ACCORDION ── */
.card-head {
  cursor: pointer; user-select: none;
}
.card-head::after {
  content: '›'; font-size: 20px; font-weight: 300; color: var(--gray);
  margin-left: auto; line-height: 1; transition: transform .2s; flex-shrink: 0;
}
.card.open .card-head::after { transform: rotate(90deg); }
.card-body { display: none; }
.card.open .card-body { display: block; }



/* ── HEADER LOGO ── */
.header-logo-img {
  height: 36px; width: auto; object-fit: contain;
  filter: brightness(0) invert(1); opacity: .92;
  }

/* ════ UNIFIED HEADER ════ */
.header, .site-header {
  position: sticky !important; top: 0; z-index: 100;
  padding: 0 16px !important;
  min-height: 56px;
  display: flex; align-items: center;
  overflow: visible !important;
}
.header-inner {
  position: relative;
  display: flex; align-items: center;
  width: 100%; max-width: 960px; margin: 0 auto;
  padding: 10px 0 10px 110px; /* 左に back-link 分の余白 */
  text-align: center;
}
/* back-link: 常に左端に固定 */
.back-link {
  position: absolute !important;
  left: 0 !important; top: 50% !important;
  transform: translateY(-50%) !important;
  display: inline-flex !important; align-items: center; gap: 5px;
  color: rgba(255,255,255,.92) !important; font-size: 12px !important;
  font-weight: 600; text-decoration: none;
  background: rgba(255,255,255,.18) !important;
  border: 1px solid rgba(255,255,255,.3) !important;
  border-radius: 20px; padding: 6px 13px !important;
  white-space: nowrap; transition: background .15s;
  margin: 0 !important;
}
.back-link:hover { background: rgba(255,255,255,.3) !important; color: #fff !important; }
/* ロゴ */
.header-logo-img {
  height: 30px !important; width: auto;
  filter: brightness(0) invert(1); opacity: .9;
  display: block; margin: 0 auto 4px;
}
/* タイトルをコンパクトに */
.header h1, .site-header h1 {
  font-size: 16px !important; font-weight: 800; color: #fff;
  letter-spacing: .02em; margin: 0;
}
.header .sub, .site-header .subtitle {
  font-size: 10px !important; color: rgba(255,255,255,.65); margin-top: 1px;
}
.header-tag {
  font-size: 10px; margin-bottom: 2px;
}
/* 小幡ページ用 */
.site-header .staff-badge { font-size: 10px; margin-bottom: 3px; }

/* ════ DESIGN REFRESH ════ */
/* カード見出し：カラー別薄ティント背景 */
.card-head {
  background: var(--blue-xlight, #eff6ff) !important;
  border-bottom: 1px solid var(--blue-light, #dbeafe) !important;
  border-left: 5px solid var(--blue-mid, #1e74c8) !important;
}
.card-head.teal  { background: rgba(13,148,136,.07) !important; border-bottom-color: rgba(13,148,136,.18) !important; border-left-color: var(--teal, #0d9488) !important; }
.card-head.amber { background: rgba(217,119,6,.07) !important;  border-bottom-color: rgba(217,119,6,.18) !important;  border-left-color: var(--amber, #d97706) !important; }
.card-head.red   { background: rgba(220,38,38,.07) !important;  border-bottom-color: rgba(220,38,38,.18) !important;  border-left-color: var(--red, #dc2626) !important; }
.card-head.green { background: rgba(22,163,74,.07) !important;  border-bottom-color: rgba(22,163,74,.18) !important;  border-left-color: var(--green, #16a34a) !important; }
/* サブタイトル：背景付きで視認性UP */
.sub-title {
  background: var(--blue-xlight, #eff6ff) !important;
  border-radius: 4px !important;
  padding: 5px 10px !important;
  border-left: 4px solid var(--blue-mid, #1e74c8) !important;
  font-size: 13px !important;
}
/* callout/note：左ボーダーを太く */
.note, .callout { border-left-width: 4px !important; }
/* ステップ番号：より鮮明 */
.proc-num { background: var(--blue, #1558a0) !important; }
/* ナビサイドバー：セクションヘッダーをより見やすく */
.nav-head {
  color: var(--blue, #1558a0) !important;
  border-bottom: 2px solid var(--blue-light, #dbeafe) !important;
  padding-bottom: 10px !important;
}

</style>
</head>
<body>
<header class="header">
  <div class="header-inner">
    <a href="../index.html" class="back-link">← 一覧</a>
    <div class="header-tag">共通業務 ⑥</div>
    <h1>📊 レセプト</h1>
    <div class="sub">ヒアリング準拠版　最終更新：2026年5月</div>
  </div>
</header>
<div class="main">
  <div class="pending">
    <div class="icon">🎙️</div>
    <h2>このセクションは録音待ちです</h2>
    <p>月次レセプト点検・請求業務の共通手順を整備予定。<br>担当者のヒアリング録音が完了次第、マニュアルを作成します。</p>
  </div>
  <div class="flow-card">
    <h3>📋 マニュアル作成の流れ</h3>
    <p>① 担当者が業務を実況しながら音声録音<br>② 文字起こしして txt ファイルで保存<br>③ AI（Claude）でマニュアル化 → このページに追記</p>
  </div>
</div>
</body>
</html>
