<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>動画案内｜岡山県保険医協会 医科第二次新点数検討会</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Noto Sans JP", sans-serif;
  background: #f0f4f8;
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 24px;
}
.card {
  background: #fff;
  border-radius: 16px;
  box-shadow: 0 4px 24px rgba(0,0,0,.12);
  max-width: 520px;
  width: 100%;
  padding: 40px 36px;
  text-align: center;
}
.org {
  font-size: 13px;
  color: #64748b;
  margin-bottom: 6px;
  letter-spacing: .05em;
}
.title {
  font-size: 22px;
  font-weight: 900;
  color: #1e40af;
  line-height: 1.4;
  margin-bottom: 6px;
}
.subtitle {
  font-size: 13px;
  color: #475569;
  margin-bottom: 28px;
}
.deadline {
  display: inline-block;
  background: #fef2f2;
  border: 2px solid #ef4444;
  color: #b91c1c;
  font-size: 15px;
  font-weight: 800;
  border-radius: 8px;
  padding: 8px 20px;
  margin-bottom: 28px;
  letter-spacing: .03em;
}
.qr-wrap {
  display: flex;
  justify-content: center;
  margin-bottom: 20px;
}
#qrcode {
  border: 4px solid #1e40af;
  border-radius: 10px;
  padding: 10px;
  background: #fff;
  display: inline-block;
}
.scan-label {
  font-size: 13px;
  color: #64748b;
  margin-bottom: 16px;
}
.url-box {
  background: #f1f5f9;
  border-radius: 8px;
  padding: 12px 16px;
  font-size: 11.5px;
  color: #334155;
  word-break: break-all;
  margin-bottom: 24px;
  border: 1px solid #e2e8f0;
}
.url-box a {
  color: #1e40af;
  text-decoration: none;
  font-weight: 600;
}
.note {
  font-size: 12px;
  color: #94a3b8;
  line-height: 1.7;
}
.divider {
  border: none;
  border-top: 1px solid #e2e8f0;
  margin: 24px 0;
}

@media print {
  body { background: #fff; padding: 0; }
  .card { box-shadow: none; border: 1px solid #ddd; }
}
</style>
</head>
<body>
<div class="card">

  <div class="org">岡山県保険医協会</div>
  <div class="title">医科<br>第二次新点数検討会</div>
  <div class="subtitle">2026年診療報酬改定 対応</div>

  <div class="deadline">⚠️ 公開期限：2026年6月21日（日）まで</div>

  <div class="qr-wrap">
    <div id="qrcode"></div>
  </div>

  <div class="scan-label">カメラで読み取るか、下のURLからアクセス</div>

  <div class="url-box">
    <a href="https://zoom.us/clips/share/a3Vx_lJOTfec-SeqQi6wZg" target="_blank">
      https://zoom.us/clips/share/a3Vx_lJOTfec-SeqQi6wZg
    </a>
  </div>

  <hr class="divider">

  <div class="note">
    ※ Zoom Clips にてご視聴いただけます<br>
    ※ 期限を過ぎると視聴不可となります<br>
    ※ スマートフォン・PCどちらからでもアクセス可
  </div>

</div>

<script>
new QRCode(document.getElementById("qrcode"), {
  text: "https://zoom.us/clips/share/a3Vx_lJOTfec-SeqQi6wZg",
  width: 200,
  height: 200,
  colorDark: "#1e40af",
  colorLight: "#ffffff",
  correctLevel: QRCode.CorrectLevel.H
});
</script>
</body>
</html>
